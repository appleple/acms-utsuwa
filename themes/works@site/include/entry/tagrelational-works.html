<!-- BEGIN_MODULE Entry_TagRelational id="{{module_id}}" -->
<section class="tag-relational clearfix">
  <h3 class="heading-md">おすすめ記事</h3>
  @include("/admin/module/setting.html")
  <!-- BEGIN notFound -->
  <div class="paragraph">この記事のハッシュタグに関連する記事が見つかりませんでした。</div><!-- END notFound -->
  <!-- BEGIN_IF [<!-- BEGIN notFound -->notFound<!-- END notFound -->/em] -->
  <div class="paragraph acms-margin-bottom-medium">この記事のハッシュタグ
    <ul class="list-inline"><!-- GET_Rendered id="tag" --></ul>
    から関連する記事を表示しています。
  </div>
  <ul class="card-list">
    <!-- BEGIN entry:loop -->
    <li class="{entry:loop.class} card-item">
      <div class="card">
        <a href="{url}" class="card-link">
          <div class="card-img-wrap">
            <!-- BEGIN_IF [{main-img@path}/nem] -->
            <img src="%{MEDIA_ARCHIVES_DIR}{main-img@path}[resizeImg(455,256)]" alt="" class="acms-img-responsive card-img" width="455" height="256">
            <!-- ELSE -->
            <!-- BEGIN image:veil -->
            <img src="%{ROOT_DIR}{path}[resizeImg(455,256)]" alt="" class="acms-img-responsive card-img" width="455" height="256"><!-- END image:veil --><!-- BEGIN noimage --><img src="/images/noimage.png" alt="" class="acms-img-responsive card-img" width="455" height="256"><!-- END noimage -->
            <!-- END_IF -->
            <!-- BEGIN new -->
            <!-- BEGIN moduleField -->
            <span class="label-triangle {new-label-position}">@include("/images/label-new-triangle.svg")</span>
            <!-- END moduleField -->
            <!-- END new -->
          </div>
          <div class="card-text-wrap">
            <!-- BEGIN_IF [{works-copy}/nem] -->
            <h2 class="card-title">{works-copy}</h2>
            <p class="card-text is-bold">{title}</p>
            <!-- ELSE -->
            <h2 class="card-title">{title}</h2>
            <!-- END_IF -->
            <ul class="tag-list"><!-- BEGIN category:veil --><!-- BEGIN categoryField -->
              <li class="label">
                {fieldCategoryName}</li><!-- END categoryField --><!-- BEGIN category:veil -->
              <!-- BEGIN industry:veil -->
              <li class="label">{work-industry}</li><!-- END industry:veil -->
            </ul>
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
  </ul>
  <!-- END_IF -->
</section>
<!-- END_MODULE Entry_TagRelational -->
