<!-- BEGIN_MODULE Field_Search -->
<div class="section-panel" id="works-search">
  <h2 class="heading-md">条件から検索する</h2>
  <div class="search-panel">
    <form action="/" method="post" class="acms-form" role="search" aria-label="検索フォーム">
      <div class="search-panel-group form-input-wrap">
        <div class="search-panel-item">
          <label for="kubun" class="search-panel-label">サイト種別</label>
          <div class="search-panel-input form-group">
            <select name="cid">
              <option>選択してください</option>
              <!-- BEGIN_MODULE Category_List -->
              <!-- BEGIN category:loop -->
              <!-- BEGIN category:veil -->
              <option value="{cid}" <!-- BEGIN_IF [%{CID}/eq/{cid}] --> selected="selected"<!-- END_IF --></option>{name}</option>
              <!-- END category:veil -->
              <!-- END category:loop -->
              <!-- END_MODULE Category_List -->
            </select>
          </div>
        </div>
        <div class="search-panel-item">
          <label for="station" class="search-panel-label">業種</label>
          <div class="search-panel-input form-group">
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-製造業">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry1} id="input-checkbox-work-industry-製造業" value="industry1" />
                <i class="ico-checkbox"></i>製造業</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-建設・建築">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry2} id="input-checkbox-work-industry-建設・建築" value="industry2" />
                <i class="ico-checkbox"></i>建設・建築</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-卸売・小売">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry3} id="input-checkbox-work-industry-卸売・小売" value="industry3" />
                <i class="ico-checkbox"></i>卸売・小売</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-医療・福祉">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry4} id="input-checkbox-work-industry-医療・福祉" value="industry4" />
                <i class="ico-checkbox"></i>医療・福祉</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-人材紹介・派遣">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry5} id="input-checkbox-work-industry-人材紹介・派遣" value="industry5" />
                <i class="ico-checkbox"></i>人材紹介・派遣</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-不動産">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry6} id="input-checkbox-work-industry-不動産" value="industry6" />
                <i class="ico-checkbox"></i>不動産</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-自治体・官公庁">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry7} id="input-checkbox-work-industry-自治体・官公庁" value="industry7" />
                <i class="ico-checkbox"></i>自治体・官公庁</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-その他">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry8} id="input-checkbox-work-industry-その他" value="industry8" />
                <i class="ico-checkbox"></i>IT・システム開発</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-その他">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#industry9} id="input-checkbox-work-industry-その他" value="industry9" />
                <i class="ico-checkbox"></i>その他</label>
            </div>
            <input type="hidden" name="field[]" value="work-industry" />
          </div>
        </div>
        <div class="search-panel-item">
          <label for="work-tag" class="search-panel-label">目的</label>
          <div class="search-panel-input form-group">
            <div class="form-checkbox">
              <label for="input-checkbox-work-goal-goal1">
                <input type="checkbox" name="work-goal[]" {work-goal:checked#goal1} id="input-checkbox-work-goal-goal1" value="goal1" />
                <i class="ico-checkbox"></i>コンバージョン改善</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-goal-goal2">
                <input type="checkbox" name="work-goal[]" {work-goal:checked#goal2} id="input-checkbox-work-goal-goal2" value="goal2" />
                <i class="ico-checkbox"></i>ユーザー体験(UX)改善</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-goal-goal3">
                <input type="checkbox" name="work-goal[]" {work-goal:checked#goal3} id="input-checkbox-work-goal-goal3" value="goal3" />
                <i class="ico-checkbox"></i>業務効率化</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-goal-goal4">
                <input type="checkbox" name="work-goal[]" {work-goal:checked#goal4} id="input-checkbox-work-goal-goal4" value="goal4" />
                <i class="ico-checkbox"></i>集客強化</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-goal-goal5">
                <input type="checkbox" name="work-goal[]" {work-goal:checked#goal5} id="input-checkbox-work-goal-goal5" value="goal4" />
                <i class="ico-checkbox"></i>ブランドイメージ強化</label>
            </div>
            <input type="hidden" name="field[]" value="work-goal" />
          </div>
        </div>
        <div class="search-panel-item">
          <label for="kubun" class="search-panel-label">キーワード</label>
          <div class="search-panel-input form-group">
            <input type="search" name="keyword" value="%{KEYWORD}" id="keyword" class="acms-form-width-full" placeholder="キーワードを入力してください">
          </div>
        </div>
        </div>
      <div class="search-panel-footer form-button-group">
        <input type="hidden" name="bid" value="%{BID}" />
        <input type="submit" name="ACMS_POST_2GET" value="検索する" class="button is-lg is-width-lg" />
      </div>
    </form>
  </div>
</div>
<!-- END_MODULE Field_Search -->
