<!-- BEGIN_MODULE Field_Search -->
<div id="works-search">
  <h2 class="heading-md">条件から検索する</h2>
  <div class="works-search-panel">
    <form action="/" method="post" class="acms-form" role="search" aria-label="検索フォーム">
      <div class="work-search-group form-input-wrap">
        <div class="work-search-item">
          <label for="kubun" class="work-search-label">カテゴリー</label>
          <div class="work-search-input form-group">
            <select name="cid">
              <option>選択してください</option>
              <!-- BEGIN_MODULE Category_List -->
              <!-- BEGIN category:loop -->
              <!-- BEGIN category:veil -->
              <option value="{cid}" <!-- BEGIN_IF [%{CID}/eq/{cid}] --> selected="selected"<!-- END_IF --></option>{name}</option>
              <!-- END category:veil -->
              <!-- END category:loop -->
              <!-- END_MODULE Category_List -->
            </select>
          </div>
        </div>
        <div class="work-search-item">
          <label for="station" class="work-search-label">業種</label>
          <div class="work-search-input form-group">
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-製造業">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#製造業} id="input-checkbox-work-industry-製造業" value="製造業" />
                <i class="ico-checkbox"></i>製造業</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-建設・建築">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#建設・建築} id="input-checkbox-work-industry-建設・建築" value="建設・建築" />
                <i class="ico-checkbox"></i>建設・建築</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-卸売・小売">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#卸売・小売} id="input-checkbox-work-industry-卸売・小売" value="卸売・小売" />
                <i class="ico-checkbox"></i>卸売・小売</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-医療・福祉">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#医療・福祉} id="input-checkbox-work-industry-医療・福祉" value="医療・福祉" />
                <i class="ico-checkbox"></i>医療・福祉</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-人材紹介・派遣">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#人材紹介・派遣} id="input-checkbox-work-industry-人材紹介・派遣" value="人材紹介・派遣" />
                <i class="ico-checkbox"></i>人材紹介・派遣</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-不動産">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#不動産} id="input-checkbox-work-industry-不動産" value="不動産" />
                <i class="ico-checkbox"></i>不動産</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-自治体・官公庁">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#自治体・官公庁} id="input-checkbox-work-industry-自治体・官公庁" value="自治体・官公庁" />
                <i class="ico-checkbox"></i>自治体・官公庁</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-industry-その他">
                <input type="checkbox" name="work-industry[]" {work-industry:checked#その他} id="input-checkbox-work-industry-その他" value="その他" />
                <i class="ico-checkbox"></i>その他</label>
            </div>
            <input type="hidden" name="field[]" value="work-industry" />
          </div>
        </div>
        <div class="work-search-item">
          <label for="work-tag" class="work-search-label">タグ</label>
          <div class="work-search-input form-group">
            <div class="form-checkbox">
              <label for="input-checkbox-work-type-コンバージョン改善">
                <input type="checkbox" name="work-type[]" {work-type:checked#コンバージョン改善} id="input-checkbox-work-type-コンバージョン改善" value="コンバージョン改善" />
                <i class="ico-checkbox"></i>コンバージョン改善</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-type-ユーザー体験 (UX) 改善">
                <input type="checkbox" name="work-type[]" {work-type:checked#ユーザー体験 (UX) 改善} id="input-checkbox-work-type-ユーザー体験 (UX) 改善" value="ユーザー体験 (UX) 改善" />
                <i class="ico-checkbox"></i>ユーザー体験 (UX) 改善</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-type-業務効率化">
                <input type="checkbox" name="work-type[]" {work-type:checked#業務効率化} id="input-checkbox-work-type-業務効率化" value="業務効率化" />
                <i class="ico-checkbox"></i>業務効率化</label>
            </div>
            <div class="form-checkbox">
              <label for="input-checkbox-work-type-ブランドイメージ強">
                <input type="checkbox" name="work-type[]" {work-type:checked#ブランドイメージ強} id="input-checkbox-work-type-ブランドイメージ強" value="ブランドイメージ強" />
                <i class="ico-checkbox"></i>ブランドイメージ強化</label>
            </div>
            <input type="hidden" name="field[]" value="work-type" />
          </div>
        </div>
      </div>
      <div class="work-search-footer form-button-group">
        <input type="hidden" name="bid" value="%{BID}" />
        <input type="submit" name="ACMS_POST_2GET" value="検索する" class="button is-lg is-width-lg" />
      </div>
    </form>
  </div>
</div>
<!-- END_MODULE Field_Search -->
