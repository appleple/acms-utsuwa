<h3 class="acms-admin-admin-title2">PC用ヘッダー設定</h3>
<table class="acms-admin-table-admin-edit">
  <tbody>
    <tr>
      <th>ヘッダーの固定</th>
      <td>
        <div class="acms-admin-form-checkbox">
          <input type="checkbox" name="header_sticky[]" {header_sticky:checked#sticky} id="input-checkbox-header_sticky-sticky" value="sticky" />
          <label for="input-checkbox-header_sticky-sticky">
            <i class="acms-admin-ico-checkbox"></i>固定する</label>
        </div>
        <input type="hidden" name="field[]" value="header_sticky" />
      </td>
    </tr>
    <tr>
      <th>ヘッダーの配置</th>
      <td>
        <div class="acms-admin-grid">
          <div class="acms-admin-col-md-4">
            <div class="acms-admin-form-radio">
              <input type="radio" name="global-nav" {global-nav:checked#nav-default} id="input-radio-global-nav-nav-default" value="nav-default" />
              <label for="input-radio-global-nav-nav-default">
                <i class="acms-admin-ico-radio"></i>ロゴ左・ナビゲーション右(標準)</label>
            </div>
          </div>
          <div class="acms-admin-col-md-4">

            <div class="acms-admin-form-radio">
              <input type="radio" name="global-nav" {global-nav:checked#nav-bottom} id="input-radio-global-nav-nav-bottom" value="nav-bottom" />
              <label for="input-radio-global-nav-nav-bottom">
                <i class="acms-admin-ico-radio"></i>ロゴ左・ナビゲーション下</label>
            </div>
          </div>
          <div class="acms-admin-col-md-4">

            <div class="acms-admin-form-radio">
              <input type="radio" name="global-nav" {global-nav:checked#logo-center} id="input-radio-global-nav-logo-center" value="logo-center" />
              <label for="input-radio-global-nav-logo-center">
                <i class="acms-admin-ico-radio"></i>ロゴ中央・ナビゲーション下</label>
            </div>
          </div>
        </div>
        <input type="hidden" name="field[]" value="global-nav" />
      </td>
    </tr>
    <tr>
      <th>電話番号・受付時間の表示</th>
      <td>
        <div class="acms-admin-form-checkbox">
          <input type="checkbox" name="header-tel[]" {header-tel:checked#true} id="input-checkbox-header-tel-true" value="true" />
          <label for="input-checkbox-header-tel-true">
            <i class="acms-admin-ico-checkbox"></i>表示する</label>
        </div>
        <input type="hidden" name="field[]" value="header-tel" />
      </td>
    </tr>
    <tr>
      <th>検索フォーム</th>
      <td>
        <div class="acms-admin-form-checkbox">
          <input type="checkbox" name="search-button[]" {search-button:checked#true} id="input-checkbox-search-button-true" value="true" />
          <label for="input-checkbox-search-button-true">
            <i class="acms-admin-ico-checkbox"></i>表示する</label>
        </div>
        <input type="hidden" name="field[]" value="search-button" />
      </td>
    </tr>
    <tr>
      <th>ボタン(1つ)を表示</th>
      <td>
        <div class="acms-admin-form-checkbox acms-admin-margin-bottom-small">
          <input type="checkbox" name="contact-button[]" {contact-button:checked#true} id="input-checkbox-contact-button-true" value="true" />
          <label for="input-checkbox-contact-button-true">
            <i class="acms-admin-ico-checkbox"></i>表示する</label>
        </div>
        <input type="hidden" name="field[]" value="contact-button" />
        <div class="acms-admin-grid">
          <div class="acms-admin-col-md-6">
            <label for="contact-button-text">
              リンクテキスト</label>
            <input type="text" id="contact-button-text" name="contact-button-text" class="acms-admin-form-width-full acms-admin-margin-top-small" value="{contact-button-text}" />
            <input type="hidden" name="field[]" value="contact-button-text" />

          </div>
          <div class="acms-admin-col-md-6">
            <label for="contact-button-url">
              リンクURL</label>
            <input type="text" id="contact-button-url" name="contact-button-url" class="acms-admin-form-width-full acms-admin-margin-top-small" value="{contact-button-url}" />
            <input type="hidden" name="field[]" value="contact-button-url" />
          </div>
        </div>
      </td>
    </tr>
  </tbody>
</table>
<h3 class="acms-admin-admin-title2">PC用ページタイトル設定</h3>
<table class="acms-admin-table-admin-edit">
  <tbody>
    <tr>
      <th>テキストの配置</th>
      <td>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title-position" {title-position:checked#left} id="input-radio-title-position-left" value="left" />
          <label for="input-radio-title-position-left">
            <i class="acms-admin-ico-radio"></i>左寄せ</label>
        </div>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title-position" {title-position:checked#center} id="input-radio-title-position-center" value="center" />
          <label for="input-radio-title-position-center">
            <i class="acms-admin-ico-radio"></i>中央寄せ</label>
        </div>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title-position" {title-position:checked#right} id="input-radio-title-position-right" value="right" />
          <label for="input-radio-title-position-right">
            <i class="acms-admin-ico-radio"></i>右寄せ</label>
        </div>
        <input type="hidden" name="field[]" value="title-position" />
      </td>
    </tr>
  </tbody>
</table>
