<!-- BEGIN custom_unit_space -->
<table class="acms-admin-table-admin-edit">
  <tr>
    <th>余白</th>
    <td>
      <div class="acms-admin-form-radio">
        <input type="radio" name="unit_space{id}" value="lg" {unit_space:checked#lg} id="input-radio-unit_space-lg-{id}" />
        <label for="input-radio-unit_space-lg-{id}">
          <i class="acms-admin-ico-radio"></i>大</label>
      </div>
      <div class="acms-admin-form-radio">
        <input type="radio" name="unit_space{id}" value="md" {unit_space:checked#md}<!-- BEGIN_IF [{unit_space}/em] -->checked="checked"<!-- END_IF --> id="input-radio-unit_space-md-{id}" />
        <label for="input-radio-unit_space-md-{id}">
          <i class="acms-admin-ico-radio"></i>中</label>
      </div>
      <div class="acms-admin-form-radio">
        <input type="radio" name="unit_space{id}" value="sm" {unit_space:checked#sm} id="input-radio-unit_space-sm-{id}" />
        <label for="input-radio-unit_space-sm-{id}">
          <i class="acms-admin-ico-radio"></i>小</label>
      </div>
      <input type="hidden" name="unit{id}[]" value="unit_space{id}" />
    </td>
  </tr>
</table>
<!-- END custom_unit_space -->
