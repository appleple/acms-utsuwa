<h3 class="acms-admin-admin-title2">CTAの設定</h3>
<table class="adminTable acms-admin-table-admin-edit">
  <tr>
    <th>背景画像<i class="acms-admin-icon-tooltip js-acms-tooltip" data-acms-tooltip="カテゴリーの背景画像を設定します。"></i></th>
    <td class="js-media-field">
      <div class="js-droparea" data-thumbnail="{cta-bg-image@thumbnail}" data-type="image" style="width:200px"></div>
      <p class="js-text acms-admin-text-danger" style="display:none">許可されていないファイルのため挿入できません。</p>
      <div class="acms-admin-margin-top-mini">
        <button type="button" class="js-insert acms-admin-btn" data-type="image">メディアを選択</button>
      </div>
      <input type="hidden" name="cta-bg-image" value="{cta-bg-image}" class="js-value" />
      <input type="hidden" name="field[]" value="cta-bg-image" />
      <input type="hidden" name="cta-bg-image:extension" value="media" />
    </td>
  </tr>
  <!-- <tr>
    <th>余白のサイズ</th>
    <td>
      <div class="acms-admin-form-radio">
        <input type="radio" name="cta_size" value="lg" {cta_size:checked#lg} id="input-radio-cta_size-lg" />
        <label for="input-radio-cta_size-lg">
          <i class="acms-admin-ico-radio"></i>ゆったり</label>
      </div>
      <div class="acms-admin-form-radio">
        <input type="radio" name="cta_size" value="md" {cta_size:checked#md} id="input-radio-cta_size-md" />
        <label for="input-radio-cta_size-md">
          <i class="acms-admin-ico-radio"></i>コンパクト</label>
      </div>
      <input type="hidden" name="field[]" value="cta_size" />
    </td>
  </tr> -->
  <tr>
    <th><label for="input-text-cta-comment">吹き出し</label></th>
    <td>
      <input type="text" name="cta-comment" value="{cta-comment}" id="input-text-cta-comment" class="acms-admin-form-width-3quarters">
      <input type="hidden" name="field[]" value="cta-comment">
    </td>
  </tr>
  <tr>
    <th><label for="input-textarea_cta-lead">リード文</label><i data-acms-tooltip="リード文を設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <textarea name="cta-lead" rows="2" id="input-textarea_cta-lead" class="acms-admin-form-width-3quarters">{cta-lead}</textarea>
      <input type="hidden" name="field[]" value="cta-lead" />
    </td>
  </tr>
  <tr>
    <th><label for="input-textarea_cta-desc">概要文</label><i data-acms-tooltip="概要文を設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <textarea name="cta-desc" rows="3" id="input-textarea_cta-desc" class="acms-admin-form-width-3quarters">{cta-desc}</textarea>
      <input type="hidden" name="field[]" value="cta-desc" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-btn-text">ボタンの文言</label></th>
    <td>
      <input type="text" name="btn-text" value="{btn-text}" id="input-text-btn-text" class="acms-admin-form-width-3quarters">
      <input type="hidden" name="field[]" value="btn-text">
    </td>
  </tr>
  <tr>
    <th><label for="input-text-btn-url">ボタンのURL</label></th>
    <td>
      <input type="text" name="btn-url" value="{btn-url}" id="input-text-btn-url" class="acms-admin-form-width-3quarters">
      <input type="hidden" name="field[]" value="btn-url">
    </td>
  </tr>
  <tr>
    <th><label for="input-text-cta-micro-copy">マイクロコピー</label></th>
    <td>
      <input type="text" name="cta-micro-copy" value="{cta-micro-copy}" id="input-text-cta-micro-copy" class="acms-admin-form-width-3quarters">
      <input type="hidden" name="field[]" value="cta-micro-copy">
    </td>
  </tr>
</table>
