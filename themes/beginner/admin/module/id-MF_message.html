<h3 class="acms-admin-admin-title2">見出し設定</h3>
<table class="adminTable acms-admin-table-admin-edit">
  <tr>
    <th><label for="input-text-module-heading">見出し</label></th>
    <td>
      <input type="text" name="module-heading" value="{module-heading}" id="input-text-module-heading" class="acms-admin-form-width-3quarters">
      <input type="hidden" name="field[]" value="module-heading">
    </td>
  </tr>
  <tr>
    <th><label for="input-text-module-heading-small">補足</label><i data-acms-tooltip="見出しの下部に表示する補足を設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <textarea name="module-heading-small" rows="2" id="input-text-module-heading-small" style="width:80%;">{module-heading-small}</textarea>
      <input type="hidden" name="field[]" value="module-heading-small" />
    </td>
  </tr>
</table>
<h3 class="acms-admin-admin-title2">コンテンツ設定</h3>
<table class="adminTable acms-admin-table-admin-edit">
  <tr>
    <th><label for="input-text-content-lead">リード文</label></th>
    <td>
      <textarea name="content-lead" rows="2" id="input-text-content-lead" style="width:80%;">{content-lead}</textarea>
      <input type="hidden" name="field[]" value="content-lead" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-content-text">本文</label></th>
    <td>
      <textarea name="content-text" rows="10" id="input-text-content-text" style="width:80%;">{content-text}</textarea>
      <input type="hidden" name="field[]" value="content-text" />
    </td>
  </tr>
</table>
