<!-- BEGIN main-image:veil -->
<div class="realestate-main-image">
  <img
    src="%{HTTP_MEDIA_ARCHIVES_DIR}{entry_main_image@path}"
    width="928"
    height="{entry_main_image@ratio}[getHeightFromRatio(928)]"
    alt="{entry_main_image@alt}"
    class="acms-img-responsive"
    fetchpriority="high"
  />
</div>
<!-- END main-image:veil -->

<div class="acms-cssgrid acms-g-cols-3 acms-mb-4" style="--acms-gap: 10px">
  <div>
    <img
      src="%{HTTP_MEDIA_ARCHIVES_DIR}{sub_image1@path}"
      width="928"
      height="{sub_image1@ratio}[getHeightFromRatio(928)]"
      alt="{sub_image1@alt}"
      class="acms-img-responsive"
      loading="lazy"
      decoding="async"
    />
  </div>
  <div>
    <img
      src="%{HTTP_MEDIA_ARCHIVES_DIR}{sub_image2@path}"
      width="928"
      height="{sub_image2@ratio}[getHeightFromRatio(928)]"
      alt="{sub_image1@alt}"
      class="acms-img-responsive"
      loading="lazy"
      decoding="async"
    />
  </div>
  <div>
    <img
      src="%{HTTP_MEDIA_ARCHIVES_DIR}{sub_image3@path}"
      width="928"
      height="{sub_image3@ratio}[getHeightFromRatio(928)]"
      alt="{sub_image1@alt}"
      class="acms-img-responsive"
      loading="lazy"
      decoding="async"
    />
  </div>
</div>

<!-- BEGIN realestate-description:veil -->
<div class="realestate-description">
  {realestate-description}[raw|nl2br]
</div>
<!-- END realestate-description:veil -->
<!-- BEGIN realestate-detail:veil -->
<dl class="not-editor-style detail-panel">
  <div class="detail-panel-group">
    <dt>区分</dt>
    <dd>%{CATEGORY_NAME}</dd>
  </div>
  <div class="detail-panel-group">
    <dt>賃料</dt>
    <dd><!-- BEGIN price:veil -->{price}[number_format]円<!-- END price:veil --></dd>
  </div>
  <div class="detail-panel-group">
    <dt>間取り</dt>
    <dd>{madori}</dd>
  </div>
  <div class="detail-panel-group">
    <dt>専有面積</dt>
    <dd><!-- BEGIN menseki:veil -->{menseki}m<sup>2</sup><!-- END menseki:veil --></dd>
  </div>
  <div class="detail-panel-group">
    <dt>築年数</dt>
    <dd><!-- BEGIN chikunen:veil -->{chikunen}年<!-- END chikunen:veil --></dd>
  </div>
  <div class="detail-panel-group">
    <dt>階数</dt>
    <dd>
      <!-- BEGIN floor-no:veil -->{floor-no}階<!-- END floor-no:veil --><!-- BEGIN total-floors:veil --> / {total-floors}階建<!-- END total-floors:veil -->
    </dd>
  </div>
  <div class="detail-panel-group">
    <dt>住所</dt>
    <dd>{address}</dd>
  </div>
  <div class="detail-panel-group">
    <dt>アクセス</dt>
    <dd>{station}より徒歩{toho}分</dd>
  </div>
</dl>
<!-- END realestate-detail:veil -->
