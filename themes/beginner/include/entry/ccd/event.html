<!-- BEGIN main-image:veil -->
<div class="event-main-image"><img src="%{HTTP_MEDIA_ARCHIVES_DIR}{main-image@path}" width="928" height="{main-image@ratio}[getHeightFromRatio(928)]" alt="{main-image@alt}" class="acms-img-responsive" /></div><!-- END main-image:veil -->
<div class="event-description">
  {event-description}[markdown]
</div>
<!-- BEGIN event-recommend:veil -->
<div class="event-recommend">
  <h2 class="heading-md">こんな方におすすめ</h2>
  <div class="entry-text-unit">
    <ul>
      {event-recommend}[list]
    </ul>
  </div>
</div>
<!-- END event-recommend:veil -->
<!-- BEGIN detail-panel:veil -->
<div class="detail-panel-wrap">
  <dl class="detail-panel is-event">
    <div class="detail-panel-group">
      <dt>開催日</dt>
      <dd>{date#Y}年{date#n}月{date#j}日（{date#l}[weekEN2JP]）</dd>
    </div>
    <!-- BEGIN event-time:veil -->
    <div class="detail-panel-group">
      <dt>開催時間</dt>
      <dd>{event-time}</dd>
    </div>
    <!-- END event-time:veil -->
    <!-- BEGIN event-fee:veil -->
    <div class="detail-panel-group">
      <dt>参加費</dt>
      <dd>{event-fee}[number_format]</dd>
    </div>
    <!-- END event-fee:veil -->
    <!-- BEGIN event-location:veil -->
    <div class="detail-panel-group">
      <dt>会場</dt>
      <dd>{event-location}<!-- BEGIN event-address:veil --><br>{event-address}<!-- END event-address:veil -->
      <!-- BEGIN event-googlemap:veil --><br><a href="{event-googlemap}" class="event-googlemap">Googleマップで見る@include("/images/icon-map-pin.svg")</a><!-- END event-googlemap:veil --></dd>
    </div>
    <!-- END event-location:veil -->
     <!-- BEGIN event-entry:veil -->
    <div class="detail-panel-group">
      <dt>申し込み方法</dt>
      <dd>{event-entry}[raw|nl2br]</dd>
    </div>
    <!-- END event-entry:veil -->
  </dl>
  <!-- END detail-panel:veil -->
</div>
