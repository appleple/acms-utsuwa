<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<!-- BEGIN_SetRendered id="new-label-position" -->
<!-- BEGIN moduleField --> {new-label-position}<!-- END moduleField -->
<!-- END_SetRendered -->
<!-- BEGIN summary_related:veil -->
<section>
  <h3 class="heading-md">%{CATEGORY_NAME}のイベント</h3>
  @include("/admin/module/setting.html")
  <ul class="card-list">
    <!-- BEGIN entry:loop -->
    <li class="{entry:loop.class} card-item">
      <div class="card">
        <a href="{url}" class="card-link">
          <div class="card-img-wrap">
            <!-- BEGIN_IF [{main-image@path}/nem] -->
            <img src="%{HTTP_MEDIA_ARCHIVES_DIR}{main-image@path}[resizeImg(455,256)]" alt="" class="acms-img-responsive card-img" width="455" height="256"><!-- ELSE -->
            <img src="/images/noimage.png" alt="" class="acms-img-responsive card-img" width="455" height="256">
            <!-- END_IF -->
            <span class="card-category-label<!-- GET_Rendered id=" new-label-position" -->"> <!-- BEGIN category:veil --><!-- BEGIN categoryField -->{fieldCategoryName}<!-- END categoryField --><!-- END category:veil --></span>
          </div>
          <div class="card-text-wrap">
            <h2 class="card-title">{title}</h2>
            <!-- BEGIN summary:veil -->
            <p class="card-text"><time class="card-date" datetime="{date#Y}-{date#n}-{date#j}">{date#Y}年{date#n}月{date#j}日 ({date#week}) <span class="event-time">{event-time}</span><!-- BEGIN new --><span class="label">New</span><!-- END new --></time>
            </p>
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
    <!-- END entry:loop -->
  </ul>
  <!-- END_IF -->
</section>
<!-- END summary_related:veil -->
<!-- END_MODULE Entry_Summary -->
