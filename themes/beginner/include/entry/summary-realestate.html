<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<div>
  @include("/include/edit/module-custom.html")
  <ul class="card-list"><!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="card-item {entry:loop.class}">
      <div class="card">
        <a href="{url}" class="card-link">
          <div class="card-img-wrap">
            <!-- BEGIN_IF [{main-image@path}/nem] -->
            <img src="%{HTTP_MEDIA_ARCHIVES_DIR}{main-image@path}[resizeImg(455,256)]" alt="" class="acms-img-responsive card-img" width="455" height="256"><!-- ELSE -->
            <img src="/images/noimage.png" alt="" class="acms-img-responsive card-img" width="455" height="256">
            <!-- END_IF -->
            <!-- BEGIN new -->
            <!-- BEGIN moduleField -->
            <span class="label-triangle {new-label-position}">@include("/images/label-new-triangle.svg")</span>
            <!-- END moduleField -->
            <!-- END new -->
            <span class="card-category-label right-bottom">{price}[number_format]円/月</span>
          </div>
          <div class="card-text-wrap">
            <h2 class="card-title">{title} <!-- BEGIN moduleField -->
              <!-- BEGIN_IF [{new_label_type}/eq/general] -->
              <span class="label">NEW</span>
              <!-- END_IF --> <!-- END moduleField -->
            </h2>
            <p class="card-text">
              <!-- BEGIN categoryField --><span class="label">{fieldCategoryName}</span><!-- END categoryField -->
              <span class="label">{station}</span> 
              <span class="label">{madori}</span>
            </p>
            <!-- BEGIN tag:veil -->
            <ul class="tag-list is-sm">
              <!-- BEGIN tag:loop -->
              <li class="tag-item">#{name}</li>
              <!-- END tag:loop -->
            </ul>
            <!-- END tag:veil -->

          </div>
        </a>
    </li>
    <!-- END entry:loop -->
  </ul>
  <!-- END unit:loop -->
  @include("/include/parts/pager.html")
</div>
<!-- END_MODULE Entry_Summary -->
