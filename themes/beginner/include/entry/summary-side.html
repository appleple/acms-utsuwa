<!-- BEGIN_MODULE Entry_Summary id="summary_side" -->
<section class="section-side">
  @include("/include/edit/module-custom.html")

  <header class="section-side-header">
    <h2 class="section-side-title">{{module_title}}</h2>
  </header>

  <!-- BEGIN notFound -->
  <p class="text-notfound-article">お探しの記事は見つかりませんでした。</p>
  <!-- END notFound -->

  <!-- BEGIN entry_list:veil -->
  <ul class="acms-my-0 acms-ps-0 acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-md-2 acms-g-cols-lg-1<!-- END_IF -->" style="--acms-gap: 1rem; --summary-side-img-aspect-ratio: 1 / 1; list-style-type: '';">
    <!-- BEGIN entry:loop -->
    <li>
      <a href="{url}" class="summary-side-link">
        <div class="summary-side-link-inner">
          <div class="summary-side">
            <div class="summary-side-img-wrap">
              <!-- BEGIN_IF [{path}/nem] -->
              <img
                src="%{ROOT_DIR}{path}[resizeImg(200)]"
                alt="{alt}"
                class="summary-side-img"
                width="200"
                height="{path}[imageRatioSizeH(200)]"
                loading="lazy"
                decoding="async"
              >
              <!-- ELSE -->
              <img
                src="/images/noimage.png"
                alt=""
                class="summary-side-img"
                width="1200"
                height="675"
                loading="lazy"
                decoding="async"
              >
              <!-- END_IF -->
            </div>
            <div>
              <!-- BEGIN labels:veil -->
              <div class="summary-side-labels-layout acms-lh-1">
                <!-- BEGIN_IF [{date#}/nem] -->
                <p class="acms-inline-block acms-my-0">
                  <span class="acms-hide-visually">投稿日</span>
                  <span class="summary-side-date-layout">
                    <time class="summary-side-date" datetime="{date#Y}-{date#m}-{date#d}">{date#Y}年{date#n}月{date#j}日（{date#week}）</time>
                    <!-- BEGIN new -->
                    <span class="label">New</span>
                    <!-- END new -->
                  </span>
                </p>
                <!-- END_IF -->
                <!-- BEGIN categoryField:veil -->
                <!-- BEGIN categoryField -->
                <p class="label">
                  <span class="acms-hide-visually">カテゴリー</span>{fieldCategoryName}
                </p>
                <!-- END categoryField -->
                <!-- END categoryField:veil -->
              </div>
              <!-- END labels:veil -->
              <h3 class="summary-side-title">{title}</h3>
            </div>
          </div>
        </div>
      </a>
    </li>
    <!-- END entry:loop -->
  </ul>
  <!-- END entry_list:veil -->
</section>
<!-- END_MODULE Entry_Summary -->
