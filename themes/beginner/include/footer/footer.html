<!-- BEGIN_MODULE Blog_Field -->
<footer class="footer">
  <div class="acms-container">
    <div class="footer-group">
      <div class="footer-item -address">
        <div class="footer-item-title">
          <div>
            @include("/include/edit/blog-custom.html")<!-- BEGIN site-description:veil -->
            <p class="footer-company-catch">{site-description}</p><!-- END site-description:veil -->
            <h2 class="footer-company-title"><!-- BEGIN_IF [{site-footer_logo@path}/nem] -->
              <img src="%{MEDIA_ARCHIVES_DIR}{site-footer_logo@path}" alt="{site_name}" class="footer-company-logo" role="img">
              <!-- ELSE -->{site_name}<!-- END_IF -->
            </h2>
            <address class="footer-address"><!-- BEGIN company-name:veil -->
              <h3 class="footer-address-name">{company-name}</h3><!-- END company-name:veil --><!-- BEGIN zip:veil -->
              <p class="footer-address-item">〒{zip}</p><!-- END zip:veil --><!-- BEGIN address:veil -->
              <p class="footer-address-item">{address}</p><!-- END address:veil --><!-- BEGIN tel:veil -->
              <p class="footer-address-item">TEL : <a href="tel:{tel}">{tel}</a>{tel-time}</p><!-- END tel:veil -->
            </address>
          </div>
        </div>
        @include("/include/parts/sns-accounts.html")
      </div>
      <div class="footer-item -navigation">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3261.3523992261353!2d136.8848467123528!3d35.1727683576225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600376dc919b8655%3A0x5bbf0168ec8292bb!2z44OZ44O844K544Kt44Oj44Oz44OX5ZCN5Y-k5bGL!5e0!3m2!1sja!2sjp!4v1752191586231!5m2!1sja!2sjp" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="acms-container">
      <div class="footer-bottom-inner">
        <p class="footer-copyright-text">{site-footer}</p>
      </div>
    </div>
  </div>
</footer>
<!-- END_MODULE Blog_Field -->
