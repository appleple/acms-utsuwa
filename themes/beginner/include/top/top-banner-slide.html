<!-- BEGIN_MODULE Media_Banner id="top_banner_slide" -->
<!-- BEGIN moduleField -->
<section class="section news-banner js-animation {section-class}">
  <div class="acms-container">
    @include("/include/edit/module-custom.html",{"hash":"#acms_box3"})
    <header class="section-vertical-header">
      <h2 class="section-vertical-heading">{module-heading}</h2>
      <p class="section-vertical-text">{module-heading-small}</p>
    </header>
    <!-- END moduleField -->
    <div id="news-banner-carousel" class="splide" aria-label="最新情報のバナー">
      <div class="splide__track">
        <ul class="splide__list"><!-- BEGIN banner:loop -->
          <li class="splide__slide"><!-- BEGIN banner#src -->{src}[raw]<!-- END banner#src --><!-- BEGIN banner#img --><a href="{url}" target="{target}"><img src="%{MEDIA_ARCHIVES_DIR}{img}" width="{x}" height="{y}" alt="{alt}" class="banner-img acms-img-responsive"></a><!-- END banner#img -->
          </li><!-- END banner:loop -->
        </ul>
        <div class="splide__arrows">
          <button class="splide__arrow splide__arrow--prev">
            @include("/images/icon-chevron-right.svg")
          </button>
          <button class="splide__arrow splide__arrow--next">
            @include("/images/icon-chevron-right.svg")
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- END_MODULE Media_Banner -->
