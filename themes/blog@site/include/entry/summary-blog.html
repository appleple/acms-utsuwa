<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<div>
  @include("/include/edit/module-custom.html")
  <ul class="card-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-sm-2 acms-g-cols-md-4<!-- END_IF -->" style="--acms-gap: 0;">
    <!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="card-item">
      <div class="card">
        <a href="{url}" class="card-link">
          <div class="card-link-inner">
            <div class="card-img-wrap">
              <!-- BEGIN image:veil -->
              <img
                src="%{ROOT_DIR}{path}[resizeImg(455,256)]"
                alt="{alt}"
                class="acms-img-responsive card-img"
                width="455"
                height="256"
                loading="lazy"
                decoding="async"
              >
              <!-- END image:veil -->
              <!-- BEGIN noimage -->
              <img
                src="/images/noimage.png"
                alt="noimage画像"
                class="acms-img-responsive card-img"
                width="455"
                height="256"
                loading="lazy"
                decoding="async"
              >
              <!-- END noimage -->
            </div>
            <div class="card-text-wrap">
              <time class="card-date" datetime="{date#Y}-{date#n}-{date#j}">{date#Y}年{date#n}月{date#j}日 ({date#week}) <!-- BEGIN new --><span class="label">New</span><!-- END new --></time>
              <!-- BEGIN category:veil --><!-- BEGIN categoryField -->
              <p class="card-category">{fieldCategoryName}</p><!-- END categoryField --><!-- END category:veil -->
              <h2 class="card-title">{title}</h2>
              <!-- BEGIN summary:veil -->
              <p class="card-text">{summary}[trim(60, '...')]</p><!-- END summary:veil -->
              <!-- BEGIN tag:veil -->
              <ul class="tag-list is-sm">
                <!-- BEGIN tag:loop -->
                <li class="tag-item">#{name}</li>
                <!-- END tag:loop -->
              </ul>
              <!-- END tag:veil -->
              <!-- BEGIN userField -->
              <p class="card-author">
                <!-- BEGIN_IF [{image@path}/nem] -->
                <img
                  src="%{HTTP_MEDIA_ARCHIVES_DIR}{image@path}[resizeImg(30,30)]"
                  width="30"
                  height="30"
                  class="card-author-img"
                  alt="{fieldUserName}のアイコン"
                  loading="lazy"
                  decoding="async"
                >{fieldUserName}
                <!-- ELSE -->
                <img
                  src="%{HTTP_ARCHIVES_DIR}{fieldUserIcon}[resizeImg(30,30)]"
                  width="30"
                  height="30"
                  class="card-author-img"
                  alt="{fieldUserName}のアイコン"
                  loading="lazy"
                  decoding="async"
                >{fieldUserName}
                <!-- END_IF -->
              </p>
              <!-- END userField -->
            </div>
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
    <!-- END unit:loop -->
  </ul>
  @include("/include/parts/pager.html")
</div>
<!-- END_MODULE Entry_Summary -->
