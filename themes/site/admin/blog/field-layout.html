<h3 class="acms-admin-admin-title2">ヘッダーレイアウト設定（PC時用）</h3>
<table class="acms-admin-table-admin-edit">
  <tbody>
    <tr>
      <th>ヘッダーの固定</th>
      <td>
        <div class="acms-admin-form-checkbox">
          <input type="checkbox" name="header_sticky[]" {header_sticky:checked#sticky} id="input-checkbox-header_sticky-sticky" value="sticky" />
          <label for="input-checkbox-header_sticky-sticky">
            <i class="acms-admin-ico-checkbox"></i>固定する</label>
        </div>
        <input type="hidden" name="field[]" value="header_sticky" />
      </td>
    </tr>
  </tbody>
</table>

<h3 class="acms-admin-admin-title2">下層ページのページタイトルレイアウト設定（PC時用）</h3>
<table class="acms-admin-table-admin-edit">
  <tbody>
    <tr>
      <th>テキストの配置</th>
      <td>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title_position" {title_position:checked#left} id="input-radio-title_position-left" value="left" />
          <label for="input-radio-title_position-left">
            <i class="acms-admin-ico-radio"></i>左寄せ</label>
        </div>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title_position" {title_position:checked#center} id="input-radio-title_position-center" value="center" />
          <label for="input-radio-title_position-center">
            <i class="acms-admin-ico-radio"></i>中央寄せ</label>
        </div>
        <div class="acms-admin-form-radio">
          <input type="radio" name="title_position" {title_position:checked#right} id="input-radio-title_position-right" value="right" />
          <label for="input-radio-title_position-right">
            <i class="acms-admin-ico-radio"></i>右寄せ</label>
        </div>
        <input type="hidden" name="field[]" value="title_position" />
      </td>
    </tr>
  </tbody>
</table>
