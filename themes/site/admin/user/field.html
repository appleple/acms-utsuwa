<h3 class="acms-admin-admin-title2">プロフィール</h3>
<table class="adminTable acms-admin-table-admin-edit">
  <tr>
    <th><label for="input-text-user-title">所属・肩書き</label><i data-acms-tooltip="ユーザーの所属・肩書きです。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <input type="text" name="user-title" value="{user-title}" size="30" id="input-text-user-title" />
      <input type="hidden" name="field[]" value="user-title" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-profile">自己紹介文</label><i data-acms-tooltip="ユーザーの詳細プロフィールです。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <textarea name="profile" rows="5" cols="50" id="input-text-profile">{profile}</textarea>
      <input type="hidden" name="field[]" value="profile" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-twitter-creator">X（旧Twitter）</label><i data-acms-tooltip="ライターのX（旧Twitter）アカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="twitter-creator" value="{twitter-creator}" size="20" id="input-text-twitter-creator" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="twitter-creator" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-facebook-creator">Facebook</label><i data-acms-tooltip="ライターのFacebookアカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="facebook-creator" value="{facebook-creator}" size="20" id="input-text-facebook-creator" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="facebook-creator" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-instagram-creator">Instagram</label><i data-acms-tooltip="ライターのInstagramアカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="instagram-creator" value="{instagram-creator}" size="20" id="input-text-instagram-creator" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="instagram-creator" />
    </td>
  </tr>
</table>
