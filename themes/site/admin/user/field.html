<h3 class="acms-admin-admin-title2">プロフィール</h3>
<table class="adminTable acms-admin-table-admin-edit">
  <tr>
    <th><label for="input-text-user_title">所属・肩書き</label><i data-acms-tooltip="ユーザーの所属・肩書きです。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <input type="text" name="user_title" value="{user_title}" size="30" id="input-text-user_title" />
      <input type="hidden" name="field[]" value="user_title" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-profile">自己紹介文</label><i data-acms-tooltip="ユーザーの詳細プロフィールです。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
      <textarea name="profile" rows="5" cols="50" id="input-text-profile">{profile}</textarea>
      <input type="hidden" name="field[]" value="profile" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-user-twitter">X（旧Twitter）</label><i data-acms-tooltip="ライターのX（旧Twitter）アカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="user-twitter" value="{user-twitter}" size="20" id="input-text-user-twitter" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="user-twitter" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-user-facebook">Facebook</label><i data-acms-tooltip="ライターのFacebookアカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="user-facebook" value="{user-facebook}" size="20" id="input-text-user-facebook" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="user-facebook" />
    </td>
  </tr>
  <tr>
    <th><label for="input-text-user-instagram">Instagram</label><i data-acms-tooltip="ライターのInstagramアカウントを設定します。" class="acms-admin-icon-tooltip js-acms-tooltip-hover"></i></th>
    <td>
        <input type="text" name="user-instagram" value="{user-instagram}" size="20" id="input-text-user-instagram" placeholder="例）ablogcms" class="acms-admin-form-width-small" />
      <input type="hidden" name="field[]" value="user-instagram" />
    </td>
  </tr>
</table>
