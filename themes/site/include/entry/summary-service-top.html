<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<!-- BEGIN moduleField -->
<section class="section js-animation {section-class}">
  <div class="acms-container">
    @include("/include/edit/module-custom.html",{"hash":"#acms_box3"})
    <!-- BEGIN module-heading:veil -->
    <header class="section-vertical-header">
      <h2 class="section-vertical-heading">{module-heading}</h2>
      <!-- BEGIN module-heading-small:veil -->
      <p class="section-vertical-text">{module-heading-small}</p>
      <!-- END module-heading-small:veil --><!-- END module-heading:veil -->
    </header><!-- END moduleField -->
    <div class="section-vertical-main">
      <ul class="card-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-md-2<!-- END_IF -->">
        <!-- BEGIN unit:loop -->
        <!-- BEGIN entry:loop -->
        <li class="js-animation-row card-item">
          <div class="card is-lg">
            <a href="{url}" class="card-link">
              <div class="card-img-wrap">
                <img
                  src="%{MEDIA_ARCHIVES_DIR}{thumbnail-image@path}[resizeImg(580,345)]"
                  alt="{thumbnail-image@alt}"
                  width="580"
                  height="345"
                  class="acms-img-responsive card-img"
                  loading="lazy"
                  decoding="async"
                >
              </div>
              <div class="card-text-wrap">
                <h3 class="card-title">{title}</h3>
                <p class="card-text full">{page-description}</p>
                <p class="card-read-more">詳しく見る <span class="icon-button">@include("/images/icon-button.svg")</span></p>
              </div>
            </a>
          </div>
        </li><!-- END entry:loop -->
        <!-- END unit:loop -->
      </ul>
    </div>
  </div>
</section>
<!-- END_MODULE Entry_Summary -->
