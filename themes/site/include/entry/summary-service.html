<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<div>
  @include("/include/edit/module-custom-box2.html")
  <ul class="card-list acms-cssgrid entry-reset<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE -->  acms-g-cols-1 acms-g-cols-sm-2 acms-g-cols-md-3<!-- END_IF -->">
    <!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="card-item">
      <div class="card is-lg">
        <a href="{url}" class="card-link">
          <div class="card-link-inner">
            <div class="card-img-wrap">
              <!-- BEGIN image:veil -->
              <img
                src="%{ROOT_DIR}{path}[resizeImg(800)]"
                alt="{alt}"
                class="acms-img-responsive card-img"
                width="800"
                height="{path}[imageRatioSizeH(800)]"
                loading="lazy"
                decoding="async"
              >
              <!-- END image:veil -->
              <!-- BEGIN noimage -->
              <img
                src="/images/noimage.png"
                alt="noimage画像"
                class="acms-img-responsive card-img"
                width="800"
                height="450"
                loading="lazy"
                decoding="async"
              >
              <!-- END noimage -->
            </div>
            <div class="card-text-wrap">
              <h3 class="card-title">{title}</h3>
              <p class="card-text full">{page-description}</p>
              <div>
                <p class="card-read-more">詳しく見る <span class="icon-button">@include("/images/icon-button.svg")</span></p>
              </div>
            </div>
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
    <!-- END unit:loop -->
  </ul>
</div>
<!-- END_MODULE Entry_Summary -->
