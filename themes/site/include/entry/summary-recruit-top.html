<!-- BEGIN_MODULE Entry_Summary id="summary_recruit_top" --><!-- BEGIN moduleField -->
<section class="section-pt<!-- BEGIN_IF [{section_class}/eq/is-bg] --> section-pb section-bg-color<!-- ELSE --> section-mb<!-- END_IF --> js-animation">
  <div class="acms-container">
    @include("/include/edit/module-custom.html",{"hash":"#acms_box3"})

    <!-- BEGIN module_heading:veil -->
    <header class="section-vertical-header">
      <h2 class="section-vertical-heading">{module_heading}</h2>
      <!-- BEGIN module_heading_small:veil -->
      <p class="section-vertical-text">{module_heading_small}</p>
      <!-- END module_heading_small:veil -->
    </header>
    <!-- END module_heading:veil --><!-- END moduleField -->

    <!-- BEGIN notFound -->
    <p class="result-text">お探しの記事は見つかりませんでした。</p>
    <!-- END notFound -->

    <div class="section-main">
      <ul class="card-bordered-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-md-2<!-- END_IF -->" style="--card-img-aspect-ratio: 5 / 2">
        <!-- BEGIN unit:loop -->
        <!-- BEGIN entry:loop -->
        <li class="card-bordered-item js-animation-row">
          <div class="card-bordered">
            <a href="{url}" class="card-bordered-link">
              <div class="card-bordered-img-wrap">
                <!-- BEGIN_IF [{path}/nem] -->
                <img
                  src="%{ROOT_DIR}{path}[resizeImg(800)]"
                  alt="{alt}"
                  class="acms-img-responsive card-bordered-img"
                  width="800"
                  height="{path}[imageRatioSizeH(800)]"
                  loading="lazy"
                  decoding="async"
                >
                <!-- ELSE -->
                <img
                  src="/images/noimage.png"
                  alt="noimage画像"
                  class="acms-img-responsive card-bordered-img"
                  width="800"
                  height="450"
                  loading="lazy"
                  decoding="async"
                >
                <!-- END_IF -->
              </div>
              <div class="card-bordered-text-wrap">
                <div class="card-bordered-text-inline">
                  <h3 class="card-bordered-title">{title}</h3>
                </div>
              </div>
            </a>
          </div>
        </li><!-- END entry:loop -->
        <!-- END unit:loop -->
      </ul>
    </div>
  </div>
</section><!-- END_MODULE Entry_Summary -->
