<!-- BEGIN userField -->
<!-- BEGIN_IF [{position}{user-title}{profile}{image@thumbnail}/nem] -->
<div class="entry-writer">
  <h4 class="heading-sm">この記事を書いたスタッフ</h4>
  <div class="profile">
    <div class="profile-body">
      <!-- BEGIN image_thumbnail:veil -->
      <div class="profile-item-img">
        <img src="%{MEDIA_ARCHIVES_DIR}{image@path}[resizeImg(90, 90)]" width="90" height="90" class="profile-img" alt="">
      </div><!-- END image_thumbnail:veil -->
      <div class="profile-item-info">
        <p class="profile-name"><!-- BEGIN profile-position:veil -->
          <span class="profile-position">{user-title}</span>
          <!-- END profile-position:veil -->
          {fieldUserName}
        </p><!-- END position_title:veil -->
        <p class="profile-text acms-hide acms-block-lg acms-block-xl">{profile}[raw|nl2br]</p>
        <!-- END profile:veil -->
        <ul class="profile-sns">
          <!-- BEGIN_IF [{facebook-creator}/nem/] -->
          <li class="profile-sns-item"><a href="https://www.facebook.com/{facebook-creator}" target="_blank" class="profile-sns-item-facebook"><img src="/images/icon-color-facebook.svg" alt="{fieldUserName}のFacebookアカウント" role="img" class="acms-img-responsive"></a></li>
          <!-- END_IF -->
          <!-- BEGIN_IF [{twitter-creator}/nem/] -->
          <li class="profile-sns-item"><a href="https://x.com/{twitter-creator}" target="_blank" class="profile-sns-item-twitter"><img src="/images/icon-color-x.svg" alt="{fieldUserName}のXアカウント" role="img" class="acms-img-responsive"></a></li>
          <!-- END_IF -->
          <!-- BEGIN_IF [{instagram-creator}/nem/] -->
          <li class="profile-sns-item"><a href="https://www.instagram.com/{instagram-creator}" target="_blank" class="profile-sns-item-instagram"><img src="/images/icon-color-instagram.png" alt="{fieldUserName}のInstagramアカウント" role="img" class="acms-img-responsive"></a></li>
          <!-- END_IF -->
        </ul>
      </div>
    </div>
    <div class="profile-footer">
      <!-- BEGIN profile:veil -->
      <p class="profile-text acms-hide-lg acms-hide-xl">{profile}[raw|nl2br]</p><!-- END profile:veil -->
      <!-- GET_Rendered id="user_entrylist" -->
    </div>
  </div>
</div>
<!-- END_IF -->
<!-- END userField -->
