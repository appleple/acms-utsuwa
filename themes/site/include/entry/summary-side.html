<!-- BEGIN_MODULE Entry_Summary ctx="{{ctx}}" id="{{module_id}}" -->
<div class="section-side-col is-full">
  @include("/include/edit/module-custom.html")
  <section class="section-side">
    <header class="section-side-header">
      <h2 class="section-side-title">新着記事</h2>
    </header>

    <!-- BEGIN notFound -->
    <p class="paragraph">ただいまページを準備しております。もうしばらくお待ちください。</p>
    <!-- END notFound -->
    <ul class="summary-side-list section-side-col"><!-- BEGIN unit:loop -->
      <!-- BEGIN entry:loop -->
      <li class="{entry:loop.class} summary-side-item">
        <a href="{url}" class="summary-side-link">
          <div class="summary-side-img-wrap"><!-- BEGIN image:veil -->
            <img src="%{ROOT_DIR}{path}[resizeImg(192,192)]" alt="" class="acms-img-responsive summary-side-img" width="455" height="256"><!-- END image:veil --><!-- BEGIN noimage --><img src="/images/noimage.png" alt="" class="noimage summary-side-img" width="192" height="192"><!-- END noimage -->
          </div>
          <div class="summary-side-text-wrap">
            <h3 class="summary-side-title">{title}</h3>
            <time class="summary-side-date" datetime="{date#Y}-{date#n}-{date#j}">{date#Y}年{date#n}月{date#j}日 ({date#week}) <!-- BEGIN new --><span class="label">New</span><!-- END new --></time>
          </div>
        </a>
      </li><!-- END entry:loop -->
      <!-- END unit:loop -->
    </ul>
  </section>
</div>
<!-- END_MODULE Entry_Summary -->
