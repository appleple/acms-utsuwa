<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
 <!-- BEGIN_IF [%{PAGE}/gte/5] -->

 <!-- ELSE_IF [%{PAGE}/eq/4] -->

 <!-- ELSE -->

 <!-- END_IF -->
<section class="summary-entry-bottom js-animation">
  <div class="container-md">
    @include("/include/edit/module-custom.html",{"hash":"#acms_box3"})
    <h2 class="heading-md heading-padding-top-none">{{module_heading}}</h2>
    <ul class="card-bordered-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-md-2<!-- END_IF -->">
      <!-- BEGIN unit:loop -->
      <!-- BEGIN entry:loop -->
      <li class="card-bordered-item js-animation-row">
        <div class="card-bordered">
          <a href="{url}" class="card-bordered-link">
            <div class="card-bordered-img-wrap">
              <img
                src="%{MEDIA_ARCHIVES_DIR}{thumbnail-image@path}[resizeImg(580,220)]"
                alt="{thumbnail-image@alt}"
                width="580"
                height="220"
                class="acms-img-responsive card-bordered-img"
                loading="lazy"
                decoding="async"
              >
            </div>
            <div class="card-bordered-text-wrap">
              <div class="card-bordered-text-inline">
                <h3 class="card-bordered-title">{title}</h3>
                <!-- <p class="card-bordered-read-more"><span class="acms-hide-visually-xs acms-hide-visually-sm acms-hide-visually-md">詳しく知る</span></p> -->
              </div>
            </div>
          </a>
        </div>
      </li><!-- END entry:loop -->
      <!-- END unit:loop -->
    </ul>
  </div>
</section><!-- END_MODULE Entry_Summary -->
