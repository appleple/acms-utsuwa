<header class="header">
  <div class="header-item-wrap">
    @include("/include/edit/blog-custom.html",{"label":"ブログ情報を編集する"})
    <!-- BEGIN_IF [%{BID}/eq/1/and/%{VIEW}/eq/top] -->
    <h1 class="header-title"><!-- ELSE -->
      <p class="header-title"><!-- END_IF -->
        <a href="%{HOME_URL}" class="header-title-link"><!-- BEGIN_IF [{site-logo@path}/nem] -->
          <img src="%{MEDIA_ARCHIVES_DIR}{site-logo@path}" alt="{site_name}" role="img" class="header-logo"><!-- ELSE -->{site_name}<!-- END_IF -->
        </a><!-- BEGIN_IF [%{BID}/eq/1/and/%{VIEW}/eq/top] -->
    </h1><!-- ELSE --></p><!-- END_IF -->
    <div class="header-item-nav">
      <div class="header-nav-wrap">
        <div class="header-nav-tel">
          <!-- BEGIN_IF [{header-tel}/nem/_and_/{tel}/nem] -->
          <span class="header-nav-tel-no">TEL： <a href="tel:{tel}">{tel}</a></span> <span class="header-nav-tel-time">{tel-time}</span>
          <!-- END_IF -->
        </div>
        <div class="header-sub-navi">
          @include("/include/parts/search-general.html")
          <!-- BEGIN_IF [{contact-button}/eq/true] -->
          <div class="header-nav-button"><a href="%{BASE_URL}{contact-button-url}" class="button is-shadow">{contact-button-text}</a></div>
          <!-- END_IF -->
        </div>
      </div>
    </div>
  </div>
  @include("/include/parts/global-nav.html")
</header>
