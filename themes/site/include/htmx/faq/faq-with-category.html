<!-- BEGIN_MODULE Category_EntryList id="{{module_id}}" -->
<!-- BEGIN categoryEntryList:loop --><!-- BEGIN categoryUl#front -->
<!-- END categoryUl#front --><!-- BEGIN category:loop -->
<section id="{categoryCode}">
<h2 class="heading-lg">{categoryName}</h2>
  <!-- BEGIN entry:veil --><ul class="faq-list"><!-- BEGIN entry:loop -->
    <li class="toggle faq js-toggle">
      <h3 class="faq-question">
        <button type="button" class="toggle-button faq-question-button js-toggle-button" aria-expanded="false" aria-controls="answer{entryId}cat" hx-trigger="click" hx-get="{entryUrl}/tpl/include/htmx/entry/body-faq-answer.html" hx-target="#jsIncludeTo{entryId}cat" hx-swap="innerHTML">
          <span class="faq-icon">Q</span>
          <span class="faq-title">{entryTitle}</span>
          <span class="toggle-icon" aria-hidden="false">
          <img src="/images/icon-chevron-down.svg" alt="">
          </span>
        </button>
      </h3>
      <div id="answer{entryId}" class="toggle-body js-toggle-body" aria-hidden="true">
        <div class="faq-answer">
          <p class="faq-icon">A</p>
          <div class="faq-body">
            <div id="jsIncludeTo{entryId}cat">
              <div class="content-loading">
                <span class="content-loading-icon"></span>
                <span class="content-loading-icon"></span>
                <span class="content-loading-icon"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </li>
    <!-- END entry:loop -->
  </ul><!-- END entry:veil -->
</section><!-- END category:loop --><!-- BEGIN categoryLi#rear -->
<!-- END categoryLi#rear --><!-- BEGIN categoryUl#rear -->
<!-- END categoryUl#rear --><!-- END categoryEntryList:loop -->
<!-- END_MODULE Category_EntryList -->
