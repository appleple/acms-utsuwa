<!-- BEGIN_MODULE Entry_List id="{{module_id}}" -->
<ul class="faq-list">
  <!-- BEGIN entry:loop -->
  <li class="toggle faq js-toggle">
    <h3 class="faq-question">
      <button type="button" class="toggle-button faq-question-button js-toggle-button" aria-expanded="false" aria-controls="answer{eid}" hx-trigger="click" hx-get="{url}/tpl/include/htmx/entry/body-faq-answer.html" hx-target="#jsIncludeTo{eid}" hx-swap="innerHTML">
        <span class="faq-icon">Q</span>
        <span class="faq-title">{title}</span>
        <span class="toggle-icon" aria-hidden="false">
          <img src="/images/icon-chevron-down.svg" alt="">
        </span>
      </button>
    </h3>
    <div id="answer{eid}" class="toggle-body js-toggle-body" aria-hidden="true">
      <div class="faq-answer">
        <p class="faq-icon">A</p>
        <div class="faq-body">
          <div id="jsIncludeTo{eid}">
            <div class="content-loading">
              <span class="content-loading-icon"></span>
              <span class="content-loading-icon"></span>
              <span class="content-loading-icon"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </li>
  <!-- END entry:loop -->
</ul>
<!-- END_MODULE Entry_List -->
