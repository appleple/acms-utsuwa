<!-- BEGIN_MODULE Entry_Summary id="{{module_id|default("summary_date")}}" -->
<div class="media-list-section">
  <!-- BEGIN media-list:veil -->
  <ul class="media-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1<!-- END_IF -->"><!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="media-item">
      <a href="{url}" class="media-link">
        <div class="media-link-inner">
          <!-- BEGIN image:veil -->
          <div class="media-item-img">
            <img src="%{ROOT_DIR}{path}[resizeImg('480','270')]" alt="{alt}" width="480" height="270" class="media-img">
          </div><!-- END image:veil -->
          <div class="media-item-text-box">
            <div class="media-item-header">
              <!-- BEGIN_IF [<!-- BEGIN new -->1<!-- END new -->{date#}/nem] -->
              <p class="media-time-label-box">
                <time class="media-time" datetime="{date#Y}-{date#m}-{date#d}">{date#Y}年{date#n}月{date#j}日（{date#week}）</time><!-- BEGIN new --><span class="label">New</span><!-- END new -->
              </p>
              <!-- END_IF -->
              <!-- BEGIN categoryField --><span class="media-category">{fieldCategoryName}</span><!-- END categoryField -->
              <h2 class="media-title">{title}</h2>
            </div>
            <p class="media-text">{summary}[trim(280, '...')]</p>
            <!-- BEGIN tag:veil -->
            <div class="media-tag-wrap">
              <ul class="tag-sm-list" aria-label="関連タグ">
                <!-- BEGIN tag:loop -->
                <li class="tag-sm-item">#{name}</li>
                <!-- END tag:loop -->
              </ul>
            </div><!-- END tag:veil -->
            <p class="media-read-more">詳しく見る <span class="icon-button">@include("/images/icon-button.svg")</span></p>
          </div>
        </div>
      </a>
    </li><!-- END entry:loop -->
    <!-- END unit:loop -->
  </ul>
  <!-- END media-list:veil -->

  <!-- BEGIN pager:veil -->
  <!-- BEGIN forwardLink -->
  <div id="search-results">
    <div class="read-more-pager">
    <a href="{url}" class="button is-width-lg"
    hx-get="{url}tpl/include/htmx/entry/summary-more.html" hx-target="#search-results" hx-swap="outerHTML">もっと見る</a>
  </div>
  <!-- END forwardLink -->
  <!-- END pager:veil -->
</div>
<!-- END_MODULE Entry_Summary -->
