<!-- BEGIN_MODULE Entry_Summary id="{{module_id|default("summary_date")}}" -->

  <!-- BEGIN media-list-wrap:veil -->
  <div class="media-list-wrap">
    <ul class="media-list"><!-- BEGIN unit:loop -->
      <!-- BEGIN entry:loop -->
      <li class="media-item">
        <a href="{url}" class="media-link<!-- BEGIN_IF [{path}/em] --> is-noimage<!-- END_IF -->">
          <!-- BEGIN image:veil -->
          <div class="media-item-img">
            <div class="media-img-wrap">
              <img src="%{ROOT_DIR}{path}[resizeImg('480','270')]" alt="" width="480" height="270" class="acms-img-responsive media-img">
            </div>
          </div><!-- END image:veil -->
          <div class="media-item-text">
            <div class="media-item-header">
              <time class="media-time" datetime="{date#Y}-{date#n}-{date#j}">{date#Y}年{date#n}月{date#j}日（{date#week}）</time><!-- BEGIN new --><span class="label">New</span><!-- END new -->
              <!-- BEGIN categoryField --><span class="media-category">{fieldCategoryName}</span><!-- END categoryField -->
              <h2 class="media-title">{title}</h2>
            </div>
            <p class="media-text">{summary}[trim(280, '...')]</p>
            <!-- BEGIN tag:veil -->
            <div class="media-tag-wrap">
              <ul class="tag-sm-list" aria-label="関連タグ">
                <!-- BEGIN tag:loop -->
                <li class="tag-sm-item">#{name}</li>
                <!-- END tag:loop -->
              </ul>
            </div><!-- END tag:veil -->
            <p class="media-read-more">詳しく見る <span class="icon-button">@include("/images/icon-button.svg")</span></p>
          </div>
        </a>
      </li><!-- END entry:loop -->
      <!-- END unit:loop -->
    </ul>
  </div>
  <!-- END media-list-wrap:veil -->

<div id="search-results">
<div class="read-more-pager">
<!-- BEGIN forwardLink --><a href="{url}" class="button is-width-lg" 
 hx-get="{url}tpl/include/htmx/entry/summary-more.html" hx-target="#search-results" hx-swap="outerHTML">もっと見る</a><!-- END forwardLink -->
</div>
</div>
<!-- END_MODULE Entry_Summary -->
