<div>
  @include("/include/edit/module-custom.html")

  <!-- END notFound -->

  <ul class="card-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-sm-2 acms-g-cols-md-3<!-- END_IF -->"><!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="card-item">
      <div class="card">
        <a href="{url}" class="card-link">
          <div class="card-link-inner">
            <div class="card-img-wrap">
              <!-- BEGIN image:veil -->
              <img
                src="%{ROOT_DIR}{path}[resizeImg(455,256)]"

                height="256"
                loading="lazy"
                decoding="async"
              >
              <!-- END image:veil -->
              <!-- BEGIN noimage -->
              <img
                src="/images/noimage.png"
                alt="noimage画像"
                class="acms-img-responsive card-img"
                width="455"
                height="256"
                loading="lazy"
                decoding="async"
              >
              <!-- END noimage -->
            </div>
            <!-- BEGIN date:veil -->
            <time class="card-date" datetime="{date#Y}-{date#m}-{date#d}">{date#Y}年{date#n}月{date#j}日（{date#week}）<!-- BEGIN new --><span class="label">New</span><!-- END new --></time>

            <h2 class="card-title">{title}</h2>
            <!-- BEGIN summary:veil -->
            <p class="card-text">{summary}[trim(60, '...')]</p><!-- END summary:veil -->
            <!-- BEGIN category:veil --><!-- BEGIN categoryField -->
            <p class="card-text">{fieldCategoryName}</p><!-- END categoryField --><!-- END category:veil -->
            <!-- BEGIN tag:veil -->
            <p class="card-text"><!-- BEGIN tag:loop -->#{name}<!-- BEGIN tagGlue --> / <!-- END tagGlue --><!-- END tag:loop --></p><!-- BEGIN tag:veil -->
            <!-- BEGIN userField -->
            <p class="card-author">
              <!-- BEGIN_IF [{image@path}/nem] -->
              <img

                width="30"
                height="30"
                class="card-author-img"
                loading="lazy"
                decoding="async"
              >{fieldUserName}
              <!-- ELSE -->
              <img
                src="%{HTTP_ARCHIVES_DIR}{fieldUserIcon}[resizeImg(30,30)]"
                alt="{fieldUserIcon@alt}"
                width="30"
                height="30"
                class="card-author-img"
                loading="lazy"
                decoding="async"
              >{fieldUserName}
              <!-- END_IF -->
            </p>
            <!-- END userField -->
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
    <!-- END unit:loop -->
  </ul>
