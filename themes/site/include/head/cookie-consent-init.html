<!-- BEGIN_MODULE Blog_Field id="root" -->
<!-- BEGIN_IF [{cookie_consent}/eq/true] -->

@verbatim
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.css">
<style>
  #cc-main {
    --cc-font-family: inherit;
    --cc-modal-border-radius: .5rem;
    --cc-btn-border-radius: .4rem;
    --cc-modal-transition-duration: .25s;
    --cc-modal-margin: 1rem;
    --cc-z-index: 2147483647;
    --cc-btn-primary-bg: var(--color-primary);
    --cc-btn-primary-border-color: var(--color-primary);
    --cc-btn-primary-hover-bg: var(--color-primary-hover);
    --cc-btn-primary-hover-border-color: var(--color-primary-hover);
    --cc-btn-border-radius: var(--border-radius-md);

    --cc-footer-bg: var(--cc-btn-secondary-bg);
    --cc-footer-color: var(--color-text);
  }

  /* クッキーモーダルの幅調整 */
  #cc-main .cm {
    max-width: 25rem; /* 見出しが1行に収まる幅 */
  }

  /* 却下ボタン */
  #cc-main .cm--inline .cm__btn + .cm__btn {
    background: var(--cc-btn-secondary-bg);
    border-color: var(--cc-btn-secondary-border-color);
    color: var(--cc-btn-secondary-color);

    &:hover {
      background: var(--cc-btn-secondary-hover-bg);
      border-color: var(--cc-btn-secondary-hover-border-color);
      color: var(--cc-btn-secondary-hover-color);
    }
  }

  /* 詳細設定モーダル */
  #cc-main .pm__section:not(:first-child):hover {
    background: transparent;
    border-color: var(--cc-separator-border-color);
  }
</style>
<script defer src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js"></script>
<script defer src="/js/cookie-consent-init.js"></script>
@endverbatim

<!-- END_IF -->
<!-- END_MODULE Blog_Field -->
