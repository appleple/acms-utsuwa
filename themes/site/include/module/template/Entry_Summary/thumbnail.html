<!-- BEGIN_MODULE Entry_Summary id="{{module_id}}" -->
<div class="not-editor-style">
  @include("/include/edit/module-custom-box2.html")

  <!-- BEGIN notFound -->
  <p class="result-text">お探しの記事は見つかりませんでした。</p>
  <!-- END notFound -->

  <ul class="card-list acms-cssgrid<!-- BEGIN_IF [{parent.loop.class}/nem] --> {parent.loop.class}<!-- ELSE --> acms-g-cols-1 acms-g-cols-sm-2<!-- END_IF -->" style="--acms-gap: var(--col-gutter); margin-block: var(--card-bg-space);">
    <!-- BEGIN unit:loop -->
    <!-- BEGIN entry:loop -->
    <li class="card-item">
      <div class="card is-lg">
        <a href="{url}" class="card-link">
          <div class="card-link-inner">
            <div class="card-img-wrap">
              <!-- BEGIN_IF [{path}/nem] -->
              <img
                src="%{ROOT_DIR}{path}[resizeImg(800)]"
                width="800"
                height="{path}[imageRatioSizeH(800)]"
                alt="{path@alt}"
                class="acms-img-responsive card-img"
                loading="lazy"
                decoding="async"
              >
              <!-- ELSE -->
              <img
                src="/images/noimage.png"
                alt="noimage画像"
                width="800"
                height="450"
                class="acms-img-responsive card-img"
                loading="lazy"
                decoding="async"
              ><!-- END_IF -->
            </div>
            <div class="card-text-wrap">
              <h3 class="card-title">{title}</h3>
              <p class="card-text">{page_description}</p>
              <div>
                <p class="card-read-more">詳しく見る <span class="icon-button">@include("/images/icon-button.svg")</span></p>
              </div>
            </div>
          </div>
        </a>
      </div>
    </li><!-- END entry:loop -->
    <!-- END unit:loop -->
  </ul>
</div>
<!-- END_MODULE Entry_Summary -->
