    - { category_id: 17, category_code: aftercare, category_status: open, category_parent: 0, category_sort: 2, category_left: 3, category_right: 4, category_name: サポート・保守について, category_scope: local, category_indexing: 'on', category_config_set_id: null, category_config_set_scope: local, category_theme_set_id: null, category_theme_set_scope: local, category_editor_set_id: null, category_editor_set_scope: local, category_blog_id: 6 }
    - { category_id: 18, category_code: career, category_status: open, category_parent: 0, category_sort: 3, category_left: 5, category_right: 6, category_name: 採用について, category_scope: local, category_indexing: 'on', category_config_set_id: null, category_config_set_scope: local, category_theme_set_id: null, category_theme_set_scope: local, category_editor_set_id: null, category_editor_set_scope: local, category_blog_id: 6 }
column:
    - { column_id: 337a675c-3ca5-4faf-8d9b-371bf23420a2, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、制作途中でも内容の変更に対応しています。</p><p>ただし、デザインや構成が大きく変わる場合や新しい機能の追加が必要な場合は、追加費用や納期の延長が発生することがあります。<br>原則として、企画・設計の段階でご要望をできるだけ具体的にお伝えいただくと、全体の進行がスムーズです。</p><p>進行中でも「もっとこうしたい」「ここを修正したい」などがあれば、遠慮なくご相談ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 67, column_blog_id: 6 }
    - { column_id: 72777561-1b3b-4f70-b8fa-a1ef8dd246ca, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、標準でスマートフォンやタブレット対応のレスポンシブデザインを提供しています。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 68, column_blog_id: 6 }
    - { column_id: d9d27555-bc64-4eab-9e1e-ced7c45f0c08, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>制作期間はご依頼内容やサイトの規模によって異なります。一般的なコーポレートサイトの場合、初回ヒアリングから納品まで<strong>約1〜2ヶ月</strong>が目安です。</p><p>途中で原稿のご用意や追加のご要望があった場合、スケジュールに影響することがあります。<br>特にオリジナルデザインや機能追加が多い場合は、さらにお時間をいただくことがあります。<br>できる限りご希望の納期に合わせて調整いたしますので、お急ぎの場合は事前にご相談ください。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="69" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-daefd5.png?v=20250710172458" class="js-smartphoto" data-group="69"><img src="/media/001/202507/sample-daefd5.png?v=20250710172458" class="unit-id-69" width="1200 " height=" 675" loading="lazy" decoding="async" data-mid="16"></a></figure></div>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 69, column_blog_id: 6 }
    - { column_id: fbcedbe8-1c62-457a-99a0-f11d153188e4, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>掲載したい内容の原稿や写真、ロゴデータなどをご用意いただくとスムーズです。参考になるサイトがあれば、事前にお伝えいただくとご要望が伝わりやすくなります。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 70, column_blog_id: 6 }
    - { column_id: aae6af83-2912-4b45-ba4b-920aa21303f8, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>保守契約がなくても、トラブル発生時には<strong>スポット対応</strong>が可能です。</p><p>例えば「サイトが表示されない」「メールが届かない」など、急なトラブルにもできる限り迅速に対応いたします。その際は、作業内容に応じて<strong>都度お見積り</strong>を提示させていただきますので、ご納得いただいたうえで対応を進めます。</p><p>保守契約を締結されているお客様には、優先的な対応や定期メンテナンスも行っています。<br>安定した運用や緊急時の即時対応をご希望の場合は、保守契約もご検討ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 72, column_blog_id: 6 }
    - { column_id: 46010736-7064-4773-97b2-a990899d4eac, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>CMSの管理マニュアルを無料でご提供しています。ご要望があれば操作説明会も実施します。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 73, column_blog_id: 6 }
    - { column_id: 6943962e-d7b9-438c-8b7f-4458bd22ef83, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>保守契約がなくても、トラブル発生時には<strong>スポット対応</strong>が可能です。</p><p>例えば「サイトが表示されない」「メールが届かない」など、急なトラブルにもできる限り迅速に対応いたします。その際は、作業内容に応じて<strong>都度お見積り</strong>を提示させていただきますので、ご納得いただいたうえで対応を進めます。</p><p>保守契約を締結されているお客様には、優先的な対応や定期メンテナンスも行っています。<br>安定した運用や緊急時の即時対応をご希望の場合は、保守契約もご検討ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 74, column_blog_id: 6 }
    - { column_id: ed14ff39-c3cd-4668-9991-531948b5ff5b, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>現在、ウェブデザイナー・フロントエンドエンジニア・ディレクターの3職種で新しいメンバーを募集しています。</p><p>ウェブデザイナーは、サイトデザインやUI/UX設計の経験をお持ちの方を歓迎します。<br>フロントエンドエンジニアには HTML / CSS / JavaScript などのコーディング経験がある方を、ディレクターには案件管理やクライアント折衝ができる方を求めています。</p><p>各職種の詳細や応募資格、待遇については <a rel="noopener noreferrer nofollow" class="link" href="//recruit/"><strong>採用情報ページ</strong></a><strong> </strong>をご覧いただくか、お気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 75, column_blog_id: 6 }
    - { column_id: f2e0ae62-5a91-420a-9f48-ccd33c94c78e, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、未経験の方も歓迎しています。やる気と学ぶ意欲があればご応募いただけます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 76, column_blog_id: 6 }
    - { column_id: 044a3f1f-7db4-4e39-8cce-1f12aad7594e, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>選考は以下の流れで行っています。</p><ol><li><p>応募フォームまたはメールでエントリー</p></li><li><p>書類選考</p></li><li><p>一次面接（オンラインまたは対面）</p></li><li><p>二次面接（必要に応じて）</p></li><li><p>内定・入社手続き</p></li></ol><p>面接ではご経験やご希望、働き方について詳しくお伺いします。<br>ご質問があれば選考途中でもお気軽にご相談ください。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="77" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710172457"><img src="/media/001/202507/sample-efd5da.png?v=20250710172457" class="unit-id-77" width="1200" height="675" loading="lazy" decoding="async" data-mid="13"></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 77, column_blog_id: 6 }
