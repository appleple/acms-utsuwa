    - { category_id: 27, category_code: aftercare, category_status: open, category_parent: 0, category_sort: 2, category_left: 3, category_right: 4, category_name: サポート・保守について, category_scope: local, category_indexing: 'on', category_config_set_id: null, category_config_set_scope: local, category_theme_set_id: null, category_theme_set_scope: local, category_editor_set_id: null, category_editor_set_scope: local, category_blog_id: 7 }
    - { category_id: 28, category_code: career, category_status: open, category_parent: 0, category_sort: 3, category_left: 5, category_right: 6, category_name: 採用について, category_scope: local, category_indexing: 'on', category_config_set_id: null, category_config_set_scope: local, category_theme_set_id: null, category_theme_set_scope: local, category_editor_set_id: null, category_editor_set_scope: local, category_blog_id: 7 }
column:
    - { column_id: 0b2a5c63-1271-48ec-b877-8c1d38d2f246, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、制作途中でも内容の変更に対応しています。</p><p>ただし、デザインや構成が大きく変わる場合や新しい機能の追加が必要な場合は、追加費用や納期の延長が発生することがあります。<br>原則として、企画・設計の段階でご要望をできるだけ具体的にお伝えいただくと、全体の進行がスムーズです。</p><p>進行中でも「もっとこうしたい」「ここを修正したい」などがあれば、遠慮なくご相談ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 139, column_blog_id: 7 }
    - { column_id: ed745843-fe10-4ee0-a08f-adb773f23ce0, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、標準でスマートフォンやタブレット対応のレスポンシブデザインを提供しています。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 140, column_blog_id: 7 }
    - { column_id: dd16e85c-8a18-4f94-8840-48a68ce7833d, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>制作期間はご依頼内容やサイトの規模によって異なります。一般的なコーポレートサイトの場合、初回ヒアリングから納品まで<strong>約1〜2ヶ月</strong>が目安です。</p><p>途中で原稿のご用意や追加のご要望があった場合、スケジュールに影響することがあります。<br>特にオリジナルデザインや機能追加が多い場合は、さらにお時間をいただくことがあります。<br>できる限りご希望の納期に合わせて調整いたしますので、お急ぎの場合は事前にご相談ください。</p><div class="media-image-block align-center"><figure class="media-width-100"><a href="/media/001/202507/sample-daefd5.png?v=20250710172458"><img src="/media/001/202507/sample-daefd5.png?v=20250710172458" class="unit-id-141" width="1200" height="675" alt=""></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 141, column_blog_id: 7 }
    - { column_id: a4da0f27-8589-4513-a8af-bc15f923a756, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>掲載したい内容の原稿や写真、ロゴデータなどをご用意いただくとスムーズです。参考になるサイトがあれば、事前にお伝えいただくとご要望が伝わりやすくなります。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 142, column_blog_id: 7 }
    - { column_id: d53c42f9-8c68-4351-8da4-eea8f6ed48ed, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>保守契約がなくても、トラブル発生時には<strong>スポット対応</strong>が可能です。</p><p>例えば「サイトが表示されない」「メールが届かない」など、急なトラブルにもできる限り迅速に対応いたします。その際は、作業内容に応じて<strong>都度お見積り</strong>を提示させていただきますので、ご納得いただいたうえで対応を進めます。</p><p>保守契約を締結されているお客様には、優先的な対応や定期メンテナンスも行っています。<br>安定した運用や緊急時の即時対応をご希望の場合は、保守契約もご検討ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 187, column_blog_id: 7 }
    - { column_id: fb4403bc-e88a-4a16-a2c1-727a1d909431, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>CMSの管理マニュアルを無料でご提供しています。ご要望があれば操作説明会も実施します。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 188, column_blog_id: 7 }
    - { column_id: 981ff8aa-ab1f-438e-88dd-87337ed037bd, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>現在、ウェブデザイナー・フロントエンドエンジニア・ディレクターの3職種で新しいメンバーを募集しています。</p><p>ウェブデザイナーは、サイトデザインやUI/UX設計の経験をお持ちの方を歓迎します。<br>フロントエンドエンジニアには HTML / CSS / JavaScript などのコーディング経験がある方を、ディレクターには案件管理やクライアント折衝ができる方を求めています。</p><p>各職種の詳細や応募資格、待遇については <a rel="noopener noreferrer nofollow" class="link" href="//recruit/"><strong>採用情報ページ</strong></a><strong> </strong>をご覧いただくか、お気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 189, column_blog_id: 7 }
    - { column_id: bdf7e793-792d-4630-b916-b5aef293998c, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>はい、未経験の方も歓迎しています。やる気と学ぶ意欲があればご応募いただけます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 190, column_blog_id: 7 }
    - { column_id: 1cde5af0-ecfa-4ae4-8299-d620fe5b8b72, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>選考は以下の流れで行っています。</p><ol><li><p>応募フォームまたはメールでエントリー</p></li><li><p>書類選考</p></li><li><p>一次面接（オンラインまたは対面）</p></li><li><p>二次面接（必要に応じて）</p></li><li><p>内定・入社手続き</p></li></ol><p>面接ではご経験やご希望、働き方について詳しくお伺いします。<br>ご質問があれば選考途中でもお気軽にご相談ください。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710172457" data-rel="SmartPhoto"><img src="/media/001/202507/sample-efd5da.png?v=20250710172457" class="unit-id-undefined" width="1200" height="675" loading="lazy" decoding="async" data-mid="51"></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 191, column_blog_id: 7 }
    - { column_id: d770d3aa-7c31-495c-9fe6-4c8e8c108e86, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>保守契約がなくても、トラブル発生時には<strong>スポット対応</strong>が可能です。</p><p>例えば「サイトが表示されない」「メールが届かない」など、急なトラブルにもできる限り迅速に対応いたします。その際は、作業内容に応じて<strong>都度お見積り</strong>を提示させていただきますので、ご納得いただいたうえで対応を進めます。</p><p>保守契約を締結されているお客様には、優先的な対応や定期メンテナンスも行っています。<br>安定した運用や緊急時の即時対応をご希望の場合は、保守契約もご検討ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 192, column_blog_id: 7 }
