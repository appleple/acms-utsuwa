      column_field_1: '<h2>職務内容</h2><p>受託制作やCMS開発事業におけるWebサイト・Webサービスのディレクション業務をお任せします。<br>具体的には以下のような業務があります。</p><ul><li><p>クライアントとの打ち合わせ・要件定義</p></li><li><p>制作スケジュールの立案・進行管理</p></li><li><p>デザイン・開発チームとの連携、タスク管理</p></li><li><p>サイトの品質チェック（UI/UX、動作確認、内容確認など）</p></li><li><p>必要に応じた簡単な更新作業やCMS操作</p></li></ul><h2>必要なスキルや経験</h2><ul><li><p>Webサイト制作に関する基本的な知識（デザイン・HTML・CMSなどの概要理解）</p></li><li><p>クライアントや社内メンバーとの円滑なコミュニケーション能力</p></li><li><p>複数案件の進行を整理し、スケジュールを管理できるスキル</p></li></ul><p>※上記を満たしていない場合でも、3日間インターンを実施した上でポテンシャル採用可能</p><h2>こんな方と働きたい</h2><ul><li><p>ユーザー体験に責任を持ちながら提案・開発をしたい方</p></li><li><p>チームメンバーに対し、自らの知識を進んで分け与えられる方</p></li><li><p>Webが好きな方</p></li></ul><h2>社内で使われているツール</h2><ul><li><p>プロジェクト管理：Backlog、Slack</p></li><li><p>デザイン：Figma</p></li><li><p>CMS：a-blog cms</p></li><li><p>バージョン管理：Git</p></li></ul><h2>募集要項</h2><div class="tableWrapper acms-table-scrollable"><table class="js-table-unit-scroll-hint" data-scrollable="true"><tbody><tr><th colspan="1" rowspan="1"><p>勤務体系</p></th><td colspan="1" rowspan="1"><p>フレックスタイム制 （7:00〜21:30 迄の間）</p><p>基本労働時間　8時間</p><p>コアタイム　なし（最低1時間は勤務を行う）</p></td></tr><tr><th colspan="1" rowspan="1"><p>試用期間</p></th><td colspan="1" rowspan="1"><p>3ヶ月</p></td></tr><tr><th colspan="1" rowspan="1"><p>休憩時間</p></th><td colspan="1" rowspan="1"><p>1時間（8時間勤務時）</p></td></tr><tr><th colspan="1" rowspan="1"><p>勤務場所</p></th><td colspan="1" rowspan="1"><p><strong>現地勤務</strong></p><p>事務所　名古屋市中村区名駅3丁目18-5</p><p><strong>リモートワーク</strong>　（試用期間中は事務所勤務）</p><p>自宅、または 事前に申請した勤務場所</p></td></tr><tr><th colspan="1" rowspan="1"><p>手当</p></th><td colspan="1" rowspan="1"><p>通勤手当</p><p>家族手当</p><p>リモートワーク手当</p><p>住宅手当（該当者のみ）</p></td></tr><tr><th colspan="1" rowspan="1"><p>休日・休暇</p></th><td colspan="1" rowspan="1"><p>有給休暇</p><p>週休2日制（土・日）</p><p>祝日</p><p>GW休暇</p><p>夏季休暇</p><p>年末年始休暇</p><p>慶弔休暇</p><p>産前産後、育児休暇、介護</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color:rgb(245,245,245);"><p>待遇</p></th><td colspan="1" rowspan="1" style="background-color:rgb(255,255,255);"><p>交通費支給　</p><p>社会保険（健康保険、厚生年金、雇用保険、労災保険）</p><p>退職金制度　選択制（勤続2年以上）</p><p>健康診断（年1回）</p><p>インフルエンザ予防接種</p><p>慶弔見舞金</p><p>リフレッシュ休暇（勤続10年）</p><p>社員セミナー参加支援</p><p>勤続10年功労金</p><p>スポーツジム契約</p></td></tr></tbody></table></div>',
