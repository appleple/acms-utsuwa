    - { field_key: content-lead, field_value: 'Ver. 3.2 で siteテーマを一新', field_type: null, field_sort: 1, field_search: 'on', field_eid: null, field_cid: null, field_uid: null, field_bid: null, field_mid: 23, field_unit_id: null, field_blog_id: 1 }
    - { field_key: content-text, field_value: "「リソースを割けないけど、デザインの品質は保証したい」\r\nそんな声から生まれたテーマがUTSUWAです。\r\n\r\nUTSUWAが保証するデザインの品質はパーツ同士のビジュアル的な調和とコンテンツの拡張のしやすさにあります。テーマはWebサイトのコンテンツを入れていく「器」でしかないため、魅力的なサイトにするためにはサイトに合わせたコンテンツを拡張していくことが必要です。\r\n\r\nWebサイト制作のビジュアル設計に関わるコストを抑え、豊富なユニットのスタイルでコンテンツをどんどん作成していくことが可能なスタートアップに最適なテーマです。", field_type: null, field_sort: 1, field_search: 'on', field_eid: null, field_cid: null, field_uid: null, field_bid: null, field_mid: 23, field_unit_id: null, field_blog_id: 1 }
