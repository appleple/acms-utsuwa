    - { field_key: content-lead, field_value: 'Ver. 3.2 で siteテーマを一新', field_type: null, field_sort: 1, field_search: 'on', field_eid: null, field_cid: null, field_uid: null, field_bid: null, field_mid: 26, field_unit_id: null, field_blog_id: 1 }
    - { field_key: content-text, field_value: "テーマデザインは\_Ver.\_3.0\_の際に追加された\_**UTSUWA**\_をベースとし、ストックコンテンツを子ブログ化して\_**より運用しやすい構造**\_を実現した **Ver. 3.2用のテーマ** です。\r\n\r\nカスタムフィールド活用のサンプルとして\_**[事例紹介](works/)**、開催日を過ぎると自動的に一覧から消える\_**[イベント情報](event/)**\_といった実践的な機能を追加しました。また\_Ver.\_3.2\_から標準搭載された\_htmx\_を活用し **[よくある質問](faq/)**\_のアコーディオン UI や\_**[お知らせ](news/)**\_の（もっと見る）ボタン、**[ブログ](blog/)** のサブカラムにあるカレンダーの月送りなどの実践的な実装の参考に提供しております。\r\n\r\n同じデザインで beginner テーマも作り直しました。**はじめて a-blog cms のテーマ実装を学ぶ** 際には、**beginnerテーマ** をおすすめしております。", field_type: null, field_sort: 1, field_search: 'on', field_eid: null, field_cid: null, field_uid: null, field_bid: null, field_mid: 26, field_unit_id: null, field_blog_id: 1 }
