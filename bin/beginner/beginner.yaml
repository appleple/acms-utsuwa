column:
    - { column_id: 00873886-b484-4062-b552-962900a9cefe, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>人気の伏見エリアに位置する1DKアパート。34㎡の使いやすい間取りに、オートロックや宅配ボックスなどセキュリティと利便性を兼ね備えています。バストイレ別、角部屋、さらにネット無料と、一人暮らしやカップルにも最適です。</p><p>交通アクセスの良さはもちろん、栄や大須エリアも徒歩圏内。1階部分なので荷物の持ち運びもラクラク。日常生活がぐっと快適になる住まいです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 3, column_blog_id: 1 }
    - { column_id: 16545826-a17e-4016-bb7c-642901d8c491, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>栄駅徒歩6分の3LDKマンション。82㎡の広々空間に加え、収納充実の間取り、角部屋・ペット可・24時間ゴミ出しなど、ハイグレードな設備が魅力です。</p><p>通勤や通学の利便性はもちろん、都心のアクティブな暮らしを楽しみたいご家族にも最適です。システムキッチンも完備し、毎日が快適に過ごせます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 17, column_blog_id: 1 }
    - { column_id: 18d94a8d-fd63-46a1-8da9-9c32d989dc71, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>富士見町2丁目の4LDK一戸建ては、駐車場2台分・南向き・リフォーム済でファミリーに大変おすすめ。広い庭があり、子どもやペットも思い切り遊べます。</p><p>都心に近いながら落ち着いた環境で、子育て世帯や二世帯住まいにもぴったりです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 29, column_blog_id: 1 }
    - { column_id: 1db75e24-e494-43b1-881e-310bc7eeecb6, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市内の不動産価格は近年堅調に推移しており、特に中心部の人気エリアでは価格が上昇傾向にあります。当社では最新の市場動向を踏まえた詳細レポートを公開しており、購入や売却をご検討中の方に役立つ情報をまとめております。</p><p>地域ごとの価格差や今後の見通しも解説しておりますので、不動産取引の判断材料としてぜひご参考ください。ご質問やご相談もお気軽にお寄せください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 40, column_blog_id: 1 }
    - { column_id: 26d99217-fbf3-482a-8c8a-5483393dcc6d, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>新栄1丁目の4LDK一戸建ては、駐車場2台・ウォークインクローゼット・リフォーム済で快適なファミリーライフをサポート。広い庭や収納充実の室内も魅力です。</p><p>落ち着いた住環境で、子育てやガーデニングにも最適。長く暮らせる理想のマイホームをお探しの方におすすめします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 28, column_blog_id: 1 }
    - { column_id: 278e76d8-14eb-424a-b10f-05c5548377d3, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>伏見駅から徒歩5分の好立地にある2LDKマンション。南向きのバルコニーは日当たり抜群で、ペット可・宅配ボックス・バストイレ別など、暮らしやすさを重視した設備が揃っています。</p><p>駅近の利便性に加え、コンビニやカフェも豊富で、単身者からカップル・ご夫婦まで幅広い世代におすすめできる物件です。快適な都心生活を送りたい方はぜひご検討ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 15, column_blog_id: 1 }
    - { column_id: 2a834752-45ce-424a-9fa3-3e96b96d7567, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>栄5丁目に位置する2LDKマンション。駅近・日当たり良好な7階住戸で、システムキッチンや24時間ゴミ出し、浴室乾燥機など先進設備が充実しています。</p><p>周辺には飲食店やショッピング施設も多く、都心生活を満喫できるロケーション。新生活を始める方に最適です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 19, column_blog_id: 1 }
    - { column_id: 2d4f0756-8a4c-405b-9ff2-2596df956ebc, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>中島町2丁目の3LDK一戸建ては、駐車場2台・南向き・リフォーム済とファミリーに嬉しいポイントが満載。庭付きで季節ごとのガーデニングも楽しめます。</p><p>閑静な住宅街に位置し、近隣にはスーパーや公園もあり、安心して子育てができる住環境です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 27, column_blog_id: 1 }
    - { column_id: 328f786c-2aad-4fa5-bf72-ec879dcf4b6a, column_status: open, column_sort: 2, column_align: center, column_type: osmap, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '', column_field_2: '35.16923952828369', column_field_3: '136.9375312328339', column_field_4: '17', column_field_5: '100', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 34, column_blog_id: 1 }
    - { column_id: 3a93997c-6e5a-403d-9dc2-0857a20bb5a8, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>丸の内3丁目の2DKマンションは、ペット可・2人入居可・オートロック・追い焚きなど充実設備が特徴。6階のため眺望も良く、駅近で通勤通学も快適です。</p><p>近くに公園やスーパーもあり、生活利便性の高い立地。幅広いニーズに対応できる物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 20, column_blog_id: 1 }
    - { column_id: 3d41efe8-aaa7-4b00-b8db-8061f4906fb1, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="30" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-30" width="1200" height="675" loading="lazy" decoding="async" data-mid="10"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 30, column_blog_id: 1 }
    - { column_id: 420b6427-3633-4b6e-af11-0fbe17b87427, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="42" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-42" width="1200" height="675" loading="lazy" decoding="async" data-mid="11"></a></figure></div><p>このたび、業務拡大に伴い、弊社オフィスを名古屋市中区錦3丁目から同区栄4丁目に移転いたしました。新オフィスはアクセスも良く、社員一同より一層サービス向上に努めてまいります。<br>今後とも変わらぬご愛顧のほどよろしくお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 42, column_blog_id: 1 }
    - { column_id: 4c1e8353-08b5-4eba-ba32-943e50c741b0, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="31" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-daefd5.png?v=20250710224839"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-31" width="1200" height="675" loading="lazy" decoding="async" data-mid="12"></a></figure></div><h2>仕事内容</h2><p>賃貸物件の巡回・点検、修繕対応、入居者対応を中心に物件管理業務を担当していただきます。安全で快適な住環境を維持するための重要な役割です。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>普通自動車免許必須</p></li><li><p>建築・設備関連の知識・経験があれば尚可</p></li><li><p>丁寧かつ迅速な対応ができる方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 23万円～30万円<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書・職務経歴書をメールにてご送付ください。書類選考後、面接をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 31, column_blog_id: 1 }
    - { column_id: 51a4bb35-b6f3-4538-8f1b-13c0afad3f6a, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>伏見駅から徒歩5分の2DKマンション。46㎡の住空間は、追い焚きやモニター付きインターホン、オートロックなど設備が充実。ペット可、2人入居可など、幅広いニーズに対応しています。</p><p>オフィス街へのアクセスも良く、在宅ワークや通勤にも便利。近隣にはカフェやスーパーも多く、生活のしやすさを重視する方におすすめです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 13, column_blog_id: 1 }
    - { column_id: 54f0f3c4-3827-4bd0-9339-72441bcc17e1, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>静かな住宅街に位置する千代田2丁目の1DKアパートです。最上階・角部屋で日当たりと風通しがよく、オートロックやネット無料で快適な一人暮らしをサポートします。敷金礼金不要で初期費用も抑えられます。</p><p>繁華街栄まで徒歩圏内なので、休日の買い物や外食にも便利。安心と快適さの両方を求める方にぴったりの住まいです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 5, column_blog_id: 1 }
    - { column_id: 55c0041b-4577-4042-989f-a1710701b603, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名駅南の静かな住宅街にある1Kアパート。最上階・ロフト付きで天井が高く、開放感があります。ネット無料や敷金礼金不要で、学生や新社会人にも人気です。</p><p>駅からも近く、生活利便性の高い立地。はじめての一人暮らしや転勤の方にもおすすめの物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 7, column_blog_id: 1 }
    - { column_id: 5e58f6bb-4dac-420c-b3fd-eec903390a90, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>栄駅から徒歩3分、3LDK・75㎡の広々とした分譲マンションです。システムキッチンや24時間ゴミ出し対応、浴室乾燥機など先進設備を備え、日当たり良好な8階角部屋。ご家族や同居を検討されている方にもおすすめです。</p><p>商業施設や飲食店も充実し、都心ならではの快適な暮らしが叶います。駅近で毎日の通勤や通学にも便利、長く住み続けたいと思える住環境がここにあります。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 12, column_blog_id: 1 }
    - { column_id: 65470474-4cfa-4236-b04a-9cb6ddb860fa, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>新栄3丁目の大型4LDK一戸建て。南面バルコニーとウォークインクローゼット、広い庭やリフォーム済の内装が特長です。ファミリー層に特におすすめで、広々とした住空間がご家族の暮らしを豊かにします。</p><p>周辺には小学校や公園も多く、子育て環境も抜群。都心近くで落ち着いた生活をお求めの方にぴったりです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 26, column_blog_id: 1 }
    - { column_id: 67682fc4-8a40-49eb-927e-0120608a3ae6, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市千種区今池にて、新築分譲マンション「ウツワレジデンス」の販売を開始いたしました。<br>交通アクセスの良さと最新設備を備えた当物件は、単身者からファミリーまで幅広いニーズに対応可能です。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="34" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-34" width="1200" height="675" loading="lazy" decoding="async" data-mid="10"></a></figure></div><p>内覧のご予約や詳細については、お気軽にお問い合わせください。スタッフが丁寧にご案内し、お客様に最適な住まいをご提案いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 34, column_blog_id: 1 }
    - { column_id: 6dc28b73-2a4a-4d80-8b6f-3394df20ebc1, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>大須エリアに立地する1Kアパート。南向きの明るいお部屋とネット無料、バストイレ別など人気設備が揃っています。宅配ボックスや敷金礼金不要もあり、初めての一人暮らしにもおすすめです。</p><p>おしゃれなカフェやショップも多いエリアで、休日も充実。都心アクセスも良好な好物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 6, column_blog_id: 1 }
    - { column_id: 7b4ce387-1740-4b59-b29f-66a1556e3fba, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年のゴールデンウィーク期間中は、4月29日（火）、5月3日（土）〜5月5日（月）を休業とさせていただきます。</p><p>その他の日は通常通り営業しておりますので、物件のご案内やお問い合わせはお早めにご連絡ください。</p><p>お客様にはご不便をおかけしますが、何卒ご理解のほどお願い申し上げます。休業期間中のお問い合わせには、営業再開後に順次対応いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 39, column_blog_id: 1 }
    - { column_id: 85cbbe88-6f4f-4d8d-9706-1c35483d94fb, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋駅から徒歩4分のハイグレードな分譲マンションです。2LDK・52㎡の広さに加え、オートロックや24時間ゴミ出し可能な設備も充実。浴室乾燥機やペット可など、快適な都市生活に欠かせない機能が満載です。角部屋で通風・採光も良好となっております。</p><p>駅近のため通勤・通学はもちろん、ショッピングやレジャーにも便利。セキュリティも高く、お子様や女性の方にも安心してご利用いただけます。将来的にご家族が増えた場合にも、余裕を持ってお住まいいただける間取りです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 11, column_blog_id: 1 }
    - { column_id: 8fef92d4-0dfa-456f-8489-4c67c89c6591, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<h2>代表メッセージ</h2><h3><strong>お客様の夢をカタチにする、信頼のウツワ◯エステート</strong></h3><div class="layout-two-column" data-layout="two-column" data-type="columns"><div data-position="" data-type="column"><p>株式会社ウツワ・エステートは、地域の皆様に信頼される不動産会社を目指してまいりました。</p><p>お客様の夢の実現を大切にし、快適で安心できる住環境の提供に努めております。</p><p>不動産は一生に一度の大切な買い物だからこそ、誠実な対応ときめ細やかなサービスで、一人ひとりのニーズに真摯に向き合います。</p><p>これからも地域社会に貢献し、信頼され続けるパートナーであり続けるよう努力してまいります。</p><p style="text-align: right"><strong>代表取締役社長　田中 ◯郎</strong></p></div><div data-position="" data-type="column"><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="1" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/portrait.jpg?v=20250805162830"><img src="/media/001/202507/portrait.jpg?v=20250805162830" class="unit-id-1" width="928" height="928" loading="lazy" decoding="async" data-mid="15"></a></figure></div></div></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 1, column_blog_id: 1 }
    - { column_id: 921b6a2d-0f23-416c-b92d-40859ec902e9, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>ファミリー層に人気の一戸建て物件です。名古屋駅から徒歩9分という希少な立地にあり、4LDK・110㎡のゆとりある住空間が広がります。駐車場2台分を備え、リフォーム済で室内外ともにきれいな状態。南向きのリビングや広い庭も魅力の一つです。</p><p>周辺は閑静な住宅街でありながら、スーパーや学校、公園も近く、子育て世帯には理想的な環境です。長く安心して住み続けられる家をお探しの方に最適な一軒となっています。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 22, column_blog_id: 1 }
    - { column_id: 930674ee-55b9-485a-814a-013cd5224e61, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>駅から徒歩7分の便利な立地にあるこちらのアパートは、1Kのシンプルな間取りと28㎡のコンパクトな空間が特徴です。南向きの明るい室内にはオートロックや宅配ボックスが完備されており、初めて一人暮らしをされる方やセキュリティ重視の方にもおすすめです。敷金・礼金不要なので、初期費用を抑えたい方にも好評です。</p><p>周辺にはコンビニや飲食店も多く、生活利便性も抜群。2階建ての2階部分となるため、上階の足音も気になりません。駅近ながら静かな住環境で、プライベートを重視される方にも安心してお住まいいただけます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 2, column_blog_id: 1 }
    - { column_id: a415932f-5f31-4c9b-9b06-f785ccffe657, column_status: open, column_sort: 2, column_align: center, column_type: quote, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: appleple, column_field_2: '@appleplecom', column_field_3: '名古屋のCMS構築・Web制作会社 アップルップル', column_field_4: Web制作、CMS構築なら名古屋のアップルップルへ。CMSを使ったWebサイトの更新など、お客様のインターネット活用をサポートいたします。お気軽にご相談ください。, column_field_5: '', column_field_6: 'https://www.appleple.com', column_field_7: '', column_field_8: 'https://www.appleple.com/media/001/202405/ogp2024.png', column_group_class: '', column_group_tag: '', column_entry_id: 35, column_blog_id: 1 }
    - { column_id: a58b052c-2ca8-497b-b9d5-9088b16b8c84, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="37" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efead5.png?v=20250710224838"><img src="/media/001/202507/sample-efead5.png?v=20250710224838" class="unit-id-37" width="1200" height="675" loading="lazy" decoding="async" data-mid="8"></a></figure></div><p>このたび、事務スタッフ（総務・管理）の募集ページを当社ホームページに新たに設けました。<br>総務や経理、管理業務を中心に、会社の円滑な運営を支える重要なポジションです。未経験の方も歓迎しております。</p><p>詳しい仕事内容や応募条件、待遇などを掲載しておりますので、ご興味のある方はぜひご覧いただき、ご応募をお待ちしております。</p><p>ご不明点があればお気軽にお問い合わせください。</p><div class="link-button-block align-left " data-type="linkButton" data-align="left"><a href="/recruit/entry-205.html" class="link-button-block-link" data-type="button">募集要項はこちら</a></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 37, column_blog_id: 1 }
    - { column_id: ad99a22e-2064-4579-9f08-3c7491826244, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年5月1日より、一部賃貸物件の仲介手数料を改定いたしました。</p><p>これはお客様により良いサービスを継続的にご提供するための見直しであり、ご理解を賜りますようお願い申し上げます。</p><p>詳細な料金や対象物件については、当社スタッフまでお気軽にお問い合わせください。今後もご満足いただけるよう努めてまいります。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="38" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-daefd5.png?v=20250710224839"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-38" width="1200" height="675" loading="lazy" decoding="async" data-mid="12"></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 38, column_blog_id: 1 }
    - { column_id: af6f210d-9e06-4d0b-8785-64af515ed85b, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>賃料5万円台で叶う、ネット無料・最上階・ロフト付きの1Kアパートです。南向きの室内は明るく、敷金礼金不要で初期費用も抑えられます。コンパクトながら使い勝手のよい設計が魅力。</p><p>徒歩圏内に商業施設や飲食店があり、暮らしの利便性も高い立地。おひとり暮らしや学生の方に特におすすめの物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 4, column_blog_id: 1 }
    - { column_id: b4098c08-d6cf-47fe-bd24-40cef0e64528, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>3LDK・95㎡のリフォーム済み一戸建て。南向きの明るいリビング、広い庭、駐車場2台分と、ファミリー向けの充実した住環境です。庭付きでお子様のいるご家庭やガーデニング好きな方にも最適です。</p><p>駅から徒歩10分の立地で、通勤や通学にも便利。長く安心して暮らせる住まいをお探しの方に、ぜひご検討いただきたい一軒です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 24, column_blog_id: 1 }
    - { column_id: b864a24a-ba69-4d68-a86a-d77d5b85056f, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名駅エリアの2DKマンション。オートロック・浴室乾燥機・2人入居可など設備も充実しており、日当たり良好な5階部分です。駅近ながら閑静なエリアで、都心でも落ち着いた生活を実現できます。</p><p>徒歩圏に商業施設やカフェが充実し、通勤・通学にも便利。新婚さんや同居を考えるカップルにもおすすめです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 16, column_blog_id: 1 }
    - { column_id: c30d1b4a-3038-4500-bc18-45cc040a313a, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="32" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710224838"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-32" width="1200" height="675" loading="lazy" decoding="async" data-mid="9"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 32, column_blog_id: 1 }
    - { column_id: ceaa1ad7-eaf8-41de-bc23-5d6c76761dd9, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年8月13日（水）から8月15日（金）まで、誠に勝手ながら夏季休業とさせていただきます。<br>この期間中にいただいたお問い合わせやご相談は、8月16日（土）以降に順次対応いたします。<br>ご不便をおかけいたしますが、ご理解のほど何卒よろしくお願い申し上げます</p><p>また、休業前後はお電話やメールでのご連絡が混み合うことが予想されますので、お早めのご連絡をお勧めいたします。今後とも変わらぬご愛顧を賜りますようお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 33, column_blog_id: 1 }
    - { column_id: ceabd9e7-c18d-4b2d-99cf-cc30005eb992, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="41" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-41" width="1200" height="675" loading="lazy" decoding="async" data-mid="10"></a></figure></div><p>個人の不動産オーナー様向けに、確定申告のサポートサービスを開始いたしました。<br>不動産収入の申告に関するご相談や書類作成の支援を専門スタッフが丁寧に対応いたします。<br>詳細はお気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 41, column_blog_id: 1 }
    - { column_id: d07a466f-dcd1-464a-9188-51d3b0a254d2, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>錦3丁目にある1Kアパートは、南向き・最上階で明るく開放感があります。オートロックやネット無料、バストイレ別など単身者に嬉しい設備も充実。</p><p>栄駅やオフィス街も近く、アクセス良好。毎日の生活を便利にしたい方に最適な一室です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 9, column_blog_id: 1 }
    - { column_id: d2659b44-d69e-454c-b1c0-1f1899450297, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋駅まで徒歩8分の2LDKマンション。59㎡とゆとりある広さで、日当たり良好・浴室乾燥機・収納充実・システムキッチンなど機能的な設備が整っています。4階部分なので眺望も良好です。</p><p>通勤・通学に便利なだけでなく、近隣にスーパーや病院もあり、生活環境も抜群。新婚さんやファミリー層にもおすすめの物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 14, column_blog_id: 1 }
    - { column_id: d3be8294-50a1-49b2-9ff7-98afbfd6bab9, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>大須3丁目の1DKアパートは、南向きの明るい室内、ネット無料、宅配ボックス完備。角部屋・バストイレ別など、暮らしやすさを大切にした設計です。</p><p>繁華街も近く、日々の買い物や外食にも便利。住み心地の良さを重視したい方におすすめの一室です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 8, column_blog_id: 1 }
    - { column_id: d416ef0b-0590-475c-a24f-14c67700ff85, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋駅徒歩圏内の閑静な住宅街にある3LDK一戸建て。広い庭と南面バルコニー、駐車場2台分が特徴で、リフォーム済のきれいな室内も魅力です。ファミリー層や広さを重視する方におすすめです。</p><p>公園やスーパーも近く、生活の利便性も十分。ゆったりとした暮らしを求めるご家族にぜひご内覧いただきたい物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 25, column_blog_id: 1 }
    - { column_id: d4c211d3-dd86-4a32-90e5-3b8952f08b93, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋駅から徒歩圏内、4LDK・120㎡の大型一戸建て。駐車場2台分や南面バルコニー、オール電化やウォークインクローゼットなど、こだわりの設備を揃えました。ファミリー向けの間取りで、お子様のいるご家庭にぴったりです。</p><p>リビングは明るく、家族団らんに最適。閑静な住宅街でありながら駅までのアクセスも良好。長く安心して暮らせる家をお探しの方へ、ぜひご見学ください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 23, column_blog_id: 1 }
    - { column_id: d8028dda-0ab6-45db-96a1-6f5fca0a05da, column_status: open, column_sort: 2, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "<h2>概要</h2><div class=\"tableWrapper\"><table><tbody><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>社名</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>株式会社ウツワ◯エステート</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>設立</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>2004年9月</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>代表者</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>山田 太郎</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>資本金</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>300万円</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>従業員数</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>15人（パート・アルバイト含）</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>所在地</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>〒000-0000</p><p>愛知県名古屋市中村区名駅0-00-0 〇〇ビル5F</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>連絡先</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>e-mail: info@example.com\_</p><p>TEL: <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" class=\"link\" href=\"tel:1234567890\">123-456-7890</a></p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>事業内容</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>不動産売買・賃貸仲介</p><p>賃貸管理業務</p><p>住宅・商業施設の企画・開発</p></td></tr><tr><th colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(245,245,245);\"><p>取引銀行</p></th><td colspan=\"1\" rowspan=\"1\" style=\"background-color:rgb(255,255,255);\"><p>〇〇銀行、〇〇銀行、〇〇銀行、〇〇信用金庫、〇〇信用金庫</p></td></tr></tbody></table></div>", column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 1, column_blog_id: 1 }
    - { column_id: da425106-25f5-4131-896b-6d67b9c9ede4, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="36" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-36" width="1200" height="675" loading="lazy" decoding="async" data-mid="11"></a></figure></div><p>地域の皆様の安全を守るため、2025年5月に防災セミナーを開催いたします。</p><p>地震や火災などの災害に備えた知識や備蓄のポイントを専門家が詳しく解説し、実践的な防災対策を学べる内容です。</p><p>参加は無料で、事前予約が必要となります。詳しい日時や場所については、当社ホームページまたはお電話にてご案内しております。多くの皆様のご参加をお待ちしております。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 36, column_blog_id: 1 }
    - { column_id: db3f0426-6185-448d-9485-640922bb703c, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名駅5丁目の2LDKマンションは、駅近でありながら静かなエリアに位置。浴室乾燥機や収納充実、ペット可・オートロックなど充実設備も魅力です。</p><p>5階の住戸で日当たりも良好。通勤・通学にも便利な立地で快適な新生活がスタートできます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 21, column_blog_id: 1 }
    - { column_id: dee9ef0f-37a9-49c0-b32c-92c0e8be9620, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>則武1丁目の1Kアパートは、最上階・ロフト付きで天井が高く、明るい空間が広がります。ネット無料や宅配ボックスも備わっており、快適な一人暮らしにぴったりです。</p><p>敷金礼金不要で初期費用を抑えたい方にも好適。駅近で生活便利な物件です。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 10, column_blog_id: 1 }
    - { column_id: e078f464-bdc4-4294-9e81-770f96127ef1, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>則武本通に立地する2LDKマンション。浴室乾燥機・収納充実・ペット可・オートロックなど、現代のニーズを満たす設備が揃っています。駅近で毎日の通勤にも便利です。</p><p>周辺は静かで住みやすく、スーパーやクリニックも近く生活に困りません。カップルやご夫婦にもおすすめです。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 18, column_blog_id: 1 }
    - { column_id: ecccba27-7ddf-4ff9-81b3-01afba912839, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="35" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710224838"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-35" width="1200" height="675" loading="lazy" decoding="async" data-mid="9"></a></figure></div><p>このたび、より快適にご利用いただけるよう、当社ホームページを全面リニューアルいたしました。<br>スマートフォンからの閲覧に最適化し、物件検索機能やお問い合わせフォームの使いやすさを大幅に向上させております。</p><p>今後も最新の物件情報やイベント情報を迅速に発信してまいります。新しいサイトをぜひご活用いただき、ご意見やご感想もお待ちしております。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 35, column_blog_id: 1 }
