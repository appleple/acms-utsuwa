column:
    - { column_id: 007b3c4c-cc64-46dc-8a66-52f1dd3cd4cf, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年のゴールデンウィーク期間中は、4月29日（火）、5月3日（土）〜5月5日（月）を休業とさせていただきます。</p><p>その他の日は通常通り営業しておりますので、物件のご案内やお問い合わせはお早めにご連絡ください。</p><p>お客様にはご不便をおかけしますが、何卒ご理解のほどお願い申し上げます。休業期間中のお問い合わせには、営業再開後に順次対応いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 69, column_blog_id: 1 }
    - { column_id: 1065865d-733a-4bca-8bcf-20a5b5efb458, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="205" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="205"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-205" width="1200" height="675" loading="lazy" data-mid="49"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 60, column_blog_id: 1 }
    - { column_id: 1b22f112-ef12-4d75-a983-8f38aa116648, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年5月1日より、一部賃貸物件の仲介手数料を改定いたしました。</p><p>これはお客様により良いサービスを継続的にご提供するための見直しであり、ご理解を賜りますようお願い申し上げます。</p><p>詳細な料金や対象物件については、当社スタッフまでお気軽にお問い合わせください。今後もご満足いただけるよう努めてまいります。</p><div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="214" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-daefd5.png?v=20250710224839" data-rel="SmartPhoto" data-group="214"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-214" width="1200 " height=" 675" loading="lazy" data-mid="51" alt=""></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 68, column_blog_id: 1 }
    - { column_id: 2daea497-eaac-4308-a828-a46f86586542, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="213" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efead5.png?v=20250710224838" data-rel="SmartPhoto" data-group="213"><img src="/media/001/202507/sample-efead5.png?v=20250710224838" class="unit-id-213" width="1200 " height=" 675" loading="lazy" data-mid="47"></a></figure></div><p>このたび、事務スタッフ（総務・管理）の募集ページを当社ホームページに新たに設けました。<br>総務や経理、管理業務を中心に、会社の円滑な運営を支える重要なポジションです。未経験の方も歓迎しております。</p><p>詳しい仕事内容や応募条件、待遇などを掲載しておりますので、ご興味のある方はぜひご覧いただき、ご応募をお待ちしております。</p><p>ご不明点があればお気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 67, column_blog_id: 1 }
    - { column_id: 2fb11032-825e-4cb7-bae5-b625fed4f9d3, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お問い合わせいただきありがとうございます。\nこのあと担当者よりお返事いたしますので、今しばらくお待ちください。\n以下の内容で送信いたしました。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 2, column_blog_id: 1 }
    - { column_id: 4d15d774-3f36-4b49-aa09-3ad2e83572e6, column_status: open, column_sort: 2, column_align: '', column_type: osmap, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: 1180x320, column_field_1: '', column_field_2: '35.16923952828369', column_field_3: '136.9375312328339', column_field_4: '17', column_field_5: 100, column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 64, column_blog_id: 1 }
    - { column_id: 569732a2-ec26-4c5f-8169-45dc3fd84082, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="211" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710224838" data-rel="SmartPhoto" data-group="211"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-211" width="1200" height="675" loading="lazy" data-mid="48"></a></figure></div><p>このたび、より快適にご利用いただけるよう、当社ホームページを全面リニューアルいたしました。<br>スマートフォンからの閲覧に最適化し、物件検索機能やお問い合わせフォームの使いやすさを大幅に向上させております。</p><p>今後も最新の物件情報やイベント情報を迅速に発信してまいります。新しいサイトをぜひご活用いただき、ご意見やご感想もお待ちしております。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 65, column_blog_id: 1 }
    - { column_id: 6056d2a9-0f0b-4e6e-839a-1d501411e9fe, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市内の不動産価格は近年堅調に推移しており、特に中心部の人気エリアでは価格が上昇傾向にあります。当社では最新の市場動向を踏まえた詳細レポートを公開しており、購入や売却をご検討中の方に役立つ情報をまとめております。</p><p>地域ごとの価格差や今後の見通しも解説しておりますので、不動産取引の判断材料としてぜひご参考ください。ご質問やご相談もお気軽にお寄せください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 70, column_blog_id: 1 }
    - { column_id: 8374c455-60b7-47e3-8769-78836ba317b9, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年8月13日（水）から8月15日（金）まで、誠に勝手ながら夏季休業とさせていただきます。<br>この期間中にいただいたお問い合わせやご相談は、8月16日（土）以降に順次対応いたします。<br>ご不便をおかけいたしますが、ご理解のほど何卒よろしくお願い申し上げます</p><p>また、休業前後はお電話やメールでのご連絡が混み合うことが予想されますので、お早めのご連絡をお勧めいたします。今後とも変わらぬご愛顧を賜りますようお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 63, column_blog_id: 1 }
    - { column_id: 89f34272-4580-4c25-9286-e965c9b0d045, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市千種区今池にて、新築分譲マンション「ウツワレジデンス」の販売を開始いたしました。<br>交通アクセスの良さと最新設備を備えた当物件は、単身者からファミリーまで幅広いニーズに対応可能です。</p><div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="210" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="210"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-210" width="1200 " height=" 675" loading="lazy" data-mid="49" alt=""></a></figure></div><p>内覧のご予約や詳細については、お気軽にお問い合わせください。スタッフが丁寧にご案内し、お客様に最適な住まいをご提案いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 64, column_blog_id: 1 }
    - { column_id: 9a54a0f0-7c66-4151-9ff2-0f28466ed644, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: お電話でのお問い合わせ, column_field_2: h2, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 1, column_blog_id: 1 }
    - { column_id: a0978cf9-2e2b-4905-8c8b-243183149842, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="208" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710224838" data-rel="SmartPhoto" data-group="208"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-208" width="1200 " height=" 675" loading="lazy" data-mid="48"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 62, column_blog_id: 1 }
    - { column_id: be803259-c903-438c-bb90-12be9332591e, column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '受付時間 8:00〜18:00（土日祝日、年末年始除く）', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 1, column_blog_id: 1 }
    - { column_id: d18a1448-aef9-4709-976b-134d384d5af2, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839" data-rel="SmartPhoto"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-undefined" width="1200 " height=" 675" loading="lazy" data-mid="50" alt=""></a></figure></div><p>このたび、業務拡大に伴い、弊社オフィスを名古屋市中区錦3丁目から同区栄4丁目に移転いたしました。新オフィスはアクセスも良く、社員一同より一層サービス向上に努めてまいります。<br>今後とも変わらぬご愛顧のほどよろしくお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 72, column_blog_id: 1 }
    - { column_id: d25b7943-a9b1-440b-8004-440c603df24d, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-undefined" width="1200 " height=" 675" loading="lazy" data-mid="49" alt=""></a></figure></div><p>個人の不動産オーナー様向けに、確定申告のサポートサービスを開始いたしました。<br>不動産収入の申告に関するご相談や書類作成の支援を専門スタッフが丁寧に対応いたします。<br>詳細はお気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 71, column_blog_id: 1 }
    - { column_id: e213db8e-f543-4e3b-842f-558653376e8f, column_status: open, column_sort: 3, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="tel:123-456-7890">TEL: 123-456-7890</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 1, column_blog_id: 1 }
    - { column_id: ebb3c8a8-95e2-44d5-a099-db799778ec65, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="207" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-daefd5.png?v=20250710224839" data-rel="SmartPhoto" data-group="207"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-207" width="1200" height="675" loading="lazy" data-mid="51"></a></figure></div><h2>仕事内容</h2><p>賃貸物件の巡回・点検、修繕対応、入居者対応を中心に物件管理業務を担当していただきます。安全で快適な住環境を維持するための重要な役割です。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>普通自動車免許必須</p></li><li><p>建築・設備関連の知識・経験があれば尚可</p></li><li><p>丁寧かつ迅速な対応ができる方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 23万円～30万円<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書・職務経歴書をメールにてご送付ください。書類選考後、面接をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 61, column_blog_id: 1 }
    - { column_id: f09d25df-42fa-4f91-b38f-1d6a3416e617, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="212" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="212"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-212" width="1200" height="675" loading="lazy" data-mid="50"></a></figure></div><p>地域の皆様の安全を守るため、2025年5月に防災セミナーを開催いたします。</p><p>地震や火災などの災害に備えた知識や備蓄のポイントを専門家が詳しく解説し、実践的な防災対策を学べる内容です。</p><p>参加は無料で、事前予約が必要となります。詳しい日時や場所については、当社ホームページまたはお電話にてご案内しております。多くの皆様のご参加をお待ちしております。</p><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 66, column_blog_id: 1 }
    - { column_id: ff1dda56-a518-4d5c-98f7-9a374e68404b, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<h2>代表メッセージ</h2><h3><strong>お客様の夢をカタチにする、信頼のウツワ◯エステート</strong></h3><div class="layout-two-column" data-layout="two-column" data-type="columns"><div data-position="" data-type="column"><p>株式会社ウツワ・エステートは、地域の皆様に信頼される不動産会社を目指してまいりました。</p><p>お客様の夢の実現を大切にし、快適で安心できる住環境の提供に努めております。</p><p>不動産は一生に一度の大切な買い物だからこそ、誠実な対応ときめ細やかなサービスで、一人ひとりのニーズに真摯に向き合います。</p><p>これからも地域社会に貢献し、信頼され続けるパートナーであり続けるよう努力してまいります。</p><p style="text-align: right"><strong>代表取締役社長　田中 ◯郎</strong></p></div><div data-position="" data-type="column"><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="15" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/portrait.jpg?v=20250718182148" data-rel="SmartPhoto" data-group="15"><img src="/media/001/202507/portrait.jpg?v=20250718182148" class="unit-id-15" width="928 " height=" 928" loading="lazy" decoding="async" data-mid="55"></a></figure></div></div></div><p></p><h2>概要</h2><div class="tableWrapper"><table class=""><tbody><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>社名</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>株式会社ウツワ◯エステート</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>設立</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>2004年9月</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>代表者</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>山田 太郎</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>資本金</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>300万円</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>従業員数</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>15人（パート・アルバイト含）</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>所在地</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>〒000-0000</p><p>愛知県名古屋市中村区名駅0-00-0 〇〇ビル5F</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>連絡先</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>e-mail: info@example.com&nbsp;</p><p>TEL: <a target="_blank" rel="noopener noreferrer nofollow" class="link" href="tel:1234567890">123-456-7890</a></p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>事業内容</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>不動産売買・賃貸仲介</p><p>賃貸管理業務</p><p>住宅・商業施設の企画・開発</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>取引銀行</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>〇〇銀行、〇〇銀行、〇〇銀行、〇〇信用金庫、〇〇信用金庫</p></td></tr></tbody></table></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 3, column_blog_id: 1 }
