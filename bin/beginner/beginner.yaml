column:
    - { column_id: 02ce179d-06d5-46b5-8bc0-dc42b219eb59, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年8月13日（水）から8月15日（金）まで、誠に勝手ながら夏季休業とさせていただきます。<br>この期間中にいただいたお問い合わせやご相談は、8月16日（土）以降に順次対応いたします。<br>ご不便をおかけいたしますが、ご理解のほど何卒よろしくお願い申し上げます</p><p>また、休業前後はお電話やメールでのご連絡が混み合うことが予想されますので、お早めのご連絡をお勧めいたします。今後とも変わらぬご愛顧を賜りますようお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 209, column_blog_id: 1 }
    - { column_id: 1e0104ad-dfa0-4b1a-ab57-f4e4423c6652, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="205" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="205"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-205" width="1200" height="675" loading="lazy" data-mid="49"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 205, column_blog_id: 1 }
    - { column_id: 2ee988cb-6ebe-4510-a080-6a51aafdb2d3, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-undefined" width="1200 " height=" 675" loading="lazy" data-mid="49" alt=""></a></figure></div><p>個人の不動産オーナー様向けに、確定申告のサポートサービスを開始いたしました。<br>不動産収入の申告に関するご相談や書類作成の支援を専門スタッフが丁寧に対応いたします。<br>詳細はお気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 217, column_blog_id: 1 }
    - { column_id: 31ed3388-7493-4102-aa80-daf0ce971921, column_status: open, column_sort: 4, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<h2>見出しを設定</h2><p class="">本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。本文を書きましょう。</p><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="220" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="220"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-220" width="1200" height="675" loading="lazy" decoding="async" data-mid="50"></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 220, column_blog_id: 1 }
    - { column_id: 405cdbf7-6da4-4632-92ca-70f13c1eb729, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年のゴールデンウィーク期間中は、4月29日（火）、5月3日（土）〜5月5日（月）を休業とさせていただきます。</p><p>その他の日は通常通り営業しておりますので、物件のご案内やお問い合わせはお早めにご連絡ください。</p><p>お客様にはご不便をおかけしますが、何卒ご理解のほどお願い申し上げます。休業期間中のお問い合わせには、営業再開後に順次対応いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 215, column_blog_id: 1 }
    - { column_id: 5326d30b-5707-4959-8766-7e5318094249, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<h2>代表メッセージ</h2><h3><strong>お客様の夢をカタチにする、信頼のウツワ◯エステート</strong></h3><div class="layout-two-column" data-layout="two-column" data-type="columns"><div data-position="" data-type="column"><p>株式会社ウツワ・エステートは、地域の皆様に信頼される不動産会社を目指してまいりました。</p><p>お客様の夢の実現を大切にし、快適で安心できる住環境の提供に努めております。</p><p>不動産は一生に一度の大切な買い物だからこそ、誠実な対応ときめ細やかなサービスで、一人ひとりのニーズに真摯に向き合います。</p><p>これからも地域社会に貢献し、信頼され続けるパートナーであり続けるよう努力してまいります。</p><p style="text-align: right"><strong>代表取締役社長　田中 ◯郎</strong></p></div><div data-position="" data-type="column"><div class="media-image-block align-center" data-type="imageBlock" data-align="center" data-width="100%" data-eid="15" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/portrait.jpg?v=20250718182148" data-rel="SmartPhoto" data-group="15"><img src="/media/001/202507/portrait.jpg?v=20250718182148" class="unit-id-15" width="928 " height=" 928" loading="lazy" decoding="async" data-mid="55"></a></figure></div></div></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 15, column_blog_id: 1 }
    - { column_id: '55', column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: acms-column-clear, column_size: '', column_field_1: お電話でのお問い合わせ, column_field_2: h2, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 3, column_blog_id: 1 }
    - { column_id: 550dd432-d4c1-49a4-a821-0702484a5e9d, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="212" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="212"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-212" width="1200" height="675" loading="lazy" data-mid="50"></a></figure></div><p>地域の皆様の安全を守るため、2025年5月に防災セミナーを開催いたします。</p><p>地震や火災などの災害に備えた知識や備蓄のポイントを専門家が詳しく解説し、実践的な防災対策を学べる内容です。</p><p>参加は無料で、事前予約が必要となります。詳しい日時や場所については、当社ホームページまたはお電話にてご案内しております。多くの皆様のご参加をお待ちしております。</p><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 212, column_blog_id: 1 }
    - { column_id: '56', column_status: open, column_sort: 3, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="tel:123-456-7890">TEL: 123-456-7890</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 3, column_blog_id: 1 }
    - { column_id: '57', column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '受付時間 8:00〜18:00（土日祝日、年末年始除く）', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 3, column_blog_id: 1 }
    - { column_id: '58', column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お問い合わせいただきありがとうございます。\nこのあと担当者よりお返事いたしますので、今しばらくお待ちください。\n以下の内容で送信いたしました。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 4, column_blog_id: 1 }
    - { column_id: 686249b7-9d0d-407f-993f-ec579f099036, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "<h1 class=\"seriesEntryHeaderTitle\">WordPressをやめたことにより、開発コストは少なく、利益は大きく。生産性の高さに驚きました。</h1><p class=\"seriesEntryHeaderTime\">2020年 10月20日（火）</p><p class=\"seriesEntryHeaderAuthor\">取材協力／ ZANMAI株式会社 五十嵐 敦さん</p><p class=\"seriesEntryArticleDesc\">今回は「新潟県で一番 a-blog cms に詳しい会社」として、ZANMAI株式会社 代表の五十嵐 敦さんが登場。コストや納期、利益、社内外の評判などのさまざまなポイントから、a-blog cms を扱うメリットとは？経営者の立場から、率直なご意見を語っていただきました。</p><h2>Web から新潟のいいものを発信し、人を呼び込む</h2><p>にいがた三昧という社名の通り、「 Web を通して新潟のいいものを発信すること」が私たちの会社の理念です。</p><p>これまで、旅館やホテルなどの観光業を中心とした Web サイト制作やプロモーションを通じて、新潟に多くの人を呼び込む集客のお手伝いをしてきました。近年では地域の行政機関や社会福祉協議会の Web サイトから企業のコーポレートサイト、リクルーティングサイト、EC 関係に至るまで、クライアントは多岐にわたります。県内には Web サイト制作を請け負う印刷会社やデザイン会社も多数ありますが、Web サイト専門のプロフェッショナルというのが私たちの強みです。</p><p>新規はもちろん、運用・保守の専門チームを配置し、クライアントのご要望にスピーディーにお応えしています。サイト制作にはこれまで XOOPS、Movable Type、concrete5、そして WordPress と多くの CMS を扱ってきましたが、現在は完全に a-blog cms 一筋です。</p><h2>矛盾とリスクを感じながらも続けていた CMS 選び</h2><p>a-blog cms を本格的に導入したのは 2019年で、実はまだ最近なんです。それまでは WordPress を使っていましたが、クライアントが更新・修正する際の扱いづらさに不満を感じていました。<strong>「さわっていたらレイアウトが崩れてしまいました！」</strong>というお問い合わせも頻繁にあり、急な対応に追われることも。このような場合には正直、お金もいただきづらくて。\_<strong>「更新はしてほしいけれど、あまりさわってほしくない」という矛盾のような気持ちを抱えていました。</strong></p><p>また WordPress のようなオープンソースの CMS は、バージョンを古いままで放っておくとハッカーに狙われやすいのですが、バージョンアップ するにはクライアントから別途費用をいただかなければなりません。また、組み込んでいたプラグインが新バージョンに対応しておらず、動かなくなって再構築する必要があったり。<br><strong>「もっと良い CMS があればいいのに。」そう考えていた時に出会ったのが、a-blog cms でした。</strong></p><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><div class=\"media-image-block align-center\" data-type=\"imageBlock\" data-align=\"center\" data-width=\"100%\" data-no-lightbox=\"false\"><figure class=\"media-width-100 columnImage\"><a href=\"https://www.a-blogcms.jp/archives/047/202010/955ba857bfaea2746c126ef3d6f4b128.png\" data-rel=\"SmartPhoto\"><img src=\"https://www.a-blogcms.jp/archives/047/202010/955ba857bfaea2746c126ef3d6f4b128.png\" class=\"unit-id-undefined\" width=\"940\" height=\"400\" loading=\"lazy\" alt=\"\"></a></figure></div><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><h2>コストと納期を大幅減！求めていた理想の CMS</h2><p>a-blog cms は最初にスタッフが見つけ、デモを見て「これだ！」と確信しました。更新のしやすさやセキュリティ面の安全性など、まさに求めていたドンピシャの CMS でした。すぐに<strong>「今後は WordPress をやめて、社内すべての Web サイト制作を a-blog cms に切り替えよう」</strong>と決断。</p><p><strong>何より気に入っているのは、その生産性の高さ</strong>です。ユニット単位でデザインしていけるため、デザイナーが全ページをデザインする必要がありません。<br>以前は 50ページの Web サイトだと、50ページ分のデザインとコーディングが必要でしたが、今では TOP ページと内部の 1 〜 2ページのみで OK。残りはディレクターや、Web の知識が少ないスタッフでも対応できます。おかげで作業工程が少なくなり、納期も短縮。<strong>以前と比べて 4 分の 3 〜 3 分の 2 程度の期間で納品できるようになりました</strong>。<br>ちょっとした修正なら、指示を出すより自分で作業した方が早いので、ディレクター自身で直せるのもいいですね。<strong>コーディングの外注費用も大幅に削減</strong>できています。</p><p>有償の CMS のため最初にコストはかかるものの、費用と納期を大きく削減でき、経営者目線でも非常にメリットを実感できていますよ。ライセンスの種類がいくつかあり、私たちは主に<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" class=\"link\" href=\"https://www.a-blogcms.jp/license/\">買い切りプラン（スタンダード）</a>を使っています。</p><p>新潟で a-blog cms をいち早く使い始めた会社として他社と優位性を保てますし、もう 2年ほど早く出会っていたかったと感じているほどです。</p><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><div class=\"media-image-block align-center\" data-type=\"imageBlock\" data-align=\"center\" data-width=\"100%\" data-no-lightbox=\"false\"><figure class=\"media-width-100 columnImage\"><a href=\"https://www.a-blogcms.jp/archives/047/202010/663611d89d90e8fee841bb48ecccac34.png\" data-rel=\"SmartPhoto\"><img src=\"https://www.a-blogcms.jp/archives/047/202010/663611d89d90e8fee841bb48ecccac34.png\" class=\"unit-id-undefined\" width=\"940\" height=\"400\" loading=\"lazy\" alt=\"\"></a></figure></div><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><h2>社内外の評価、セキュリティの安心感も UP へ</h2><p>a-blog cms に切り替えてから<strong>「更新しやすい」とクライアントからの評判も上々</strong>です。</p><p>なかでもホームページを見たまま編集できる<strong>ダイレクト編集機能</strong>が非常に好評。Web サイトを閲覧している感覚で直していけるのがいいですね。リニューアルで a-blog cms を使うようになったクライアントからは、自分たちで直せるため、以前のような修正依頼をいただくことがほとんどなくなりました。<br>まず、表示が崩れてしまうことがないんですよ。プラグインを組み込む必要がないのも助かっています。</p><p>またセキュリティ面でも、国産の a-blog cms は世界のハッカーから狙われるリスクが少なくなりました。もちろん、導入時には覚えることが多くて大変でした。分からないことがある度、それこそ 1日に何度もアップルップルに問い合わせをして、正直「迷惑じゃないかな」と不安に感じたくらい（笑）それでも、一つひとつ丁寧かつスピーディーに回答してくれて。</p><p>あのまま WordPress を続けていたらもっと苦労していたかもしれません。 おかげさまで、<strong>今では社内全員が「a-blog cms にして本当に良かった」</strong>\_と言っています。</p><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><div class=\"media-image-block align-center\" data-type=\"imageBlock\" data-align=\"center\" data-width=\"100%\" data-no-lightbox=\"false\"><figure class=\"media-width-100 columnImage\"><a href=\"https://www.a-blogcms.jp/archives/047/202010/f0abe4331e000fe28f570723fdc6c567.png\" data-rel=\"SmartPhoto\"><img src=\"https://www.a-blogcms.jp/archives/047/202010/f0abe4331e000fe28f570723fdc6c567.png\" class=\"unit-id-undefined\" width=\"940\" height=\"400\" loading=\"lazy\" alt=\"\"></a></figure></div><p class=\"caption\">ホームページを見たまま編集できるダイレクト編集機能の更新イメージ</p><div data-type=\"horizontalRule\"><hr class=\"clearHidden\"></div><h2>こまめな更新で、自社サイトの検索表示が 1位に</h2><p>Web サイトを更新して育てていくことの大切さを改めて実感したのも、a-blog cms のおかげです。</p><p>何より強く感じたのは、昨年 a-blog cms を使って自社サイトをリニューアルした時。こつこつとブログを書き、<strong>更新を続けた結果、「新潟 ホームページ制作」で検索した時の表示順位がみるみると上がっていったんです</strong>。</p><p>もともとリニューアル前は大体 19〜 20位だったものが、3ヶ月で 10位以内、半年後にはなんと 1位になり、現在も首位をキープしています（※ 2020年 10月現在）。おかげで HP 経由の新規お問い合わせが倍増し、これまで以上に多くのご依頼をいただけるようになりました。</p><p>Web を使ったプロモーションには、やはり<strong>いいコンテンツを継続的に更新していくことが有効だ</strong>と、身をもって学ぶことができました。a-blog cms を使い始めてからというもの、会社全体が良い方向に進んでいます。</p><p><br></p>", column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 220, column_blog_id: 1 }
    - { column_id: 6e2833ab-8504-4253-8b31-07de01843889, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="211" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-efd5da.png?v=20250710224838" data-rel="SmartPhoto" data-group="211"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-211" width="1200 " height=" 675" loading="lazy" data-mid="48" alt=""></a></figure></div><p>このたび、より快適にご利用いただけるよう、当社ホームページを全面リニューアルいたしました。<br>スマートフォンからの閲覧に最適化し、物件検索機能やお問い合わせフォームの使いやすさを大幅に向上させております。</p><p>今後も最新の物件情報やイベント情報を迅速に発信してまいります。新しいサイトをぜひご活用いただき、ご意見やご感想もお待ちしております。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 211, column_blog_id: 1 }
    - { column_id: 7a615966-28ff-49f6-9c8e-38636dbf74b6, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-ddd5ef.png?v=20250710224839" data-rel="SmartPhoto"><img src="/media/001/202507/sample-ddd5ef.png?v=20250710224839" class="unit-id-undefined" width="1200 " height=" 675" loading="lazy" data-mid="50" alt=""></a></figure></div><p>このたび、業務拡大に伴い、弊社オフィスを名古屋市中区錦3丁目から同区栄4丁目に移転いたしました。新オフィスはアクセスも良く、社員一同より一層サービス向上に努めてまいります。<br>今後とも変わらぬご愛顧のほどよろしくお願い申し上げます。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 218, column_blog_id: 1 }
    - { column_id: 803c35c4-7798-4d0e-9e2f-afdf1ed5ed2f, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市千種区今池にて、新築分譲マンション「ウツワレジデンス」の販売を開始いたしました。<br>交通アクセスの良さと最新設備を備えた当物件は、単身者からファミリーまで幅広いニーズに対応可能です。</p><div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="210" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-d5e7ef.png?v=20250710224839" data-rel="SmartPhoto" data-group="210"><img src="/media/001/202507/sample-d5e7ef.png?v=20250710224839" class="unit-id-210" width="1200 " height=" 675" loading="lazy" data-mid="49" alt=""></a></figure></div><p>内覧のご予約や詳細については、お気軽にお問い合わせください。スタッフが丁寧にご案内し、お客様に最適な住まいをご提案いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 210, column_blog_id: 1 }
    - { column_id: 89acdbaa-913b-4a8d-82ff-667232bb15a4, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="207" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-daefd5.png?v=20250710224839" data-rel="SmartPhoto" data-group="207"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-207" width="1200" height="675" loading="lazy" data-mid="51"></a></figure></div><h2>仕事内容</h2><p>賃貸物件の巡回・点検、修繕対応、入居者対応を中心に物件管理業務を担当していただきます。安全で快適な住環境を維持するための重要な役割です。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>普通自動車免許必須</p></li><li><p>建築・設備関連の知識・経験があれば尚可</p></li><li><p>丁寧かつ迅速な対応ができる方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 23万円～30万円<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書・職務経歴書をメールにてご送付ください。書類選考後、面接をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 207, column_blog_id: 1 }
    - { column_id: abb5e578-409a-46fe-8171-8bd6084ed03b, column_status: open, column_sort: 1, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="208" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efd5da.png?v=20250710224838" data-rel="SmartPhoto" data-group="208"><img src="/media/001/202507/sample-efd5da.png?v=20250710224838" class="unit-id-208" width="1200 " height=" 675" loading="lazy" data-mid="48"></a></figure></div><h2>仕事内容</h2><p>主に賃貸・売買物件のご案内、契約手続き、顧客フォローを担当していただきます。お客様のニーズを丁寧にヒアリングし、最適な物件をご提案してください。</p><h2>応募資格</h2><ul><li><p>高卒以上</p></li><li><p>営業経験者優遇（業界未経験者も歓迎）</p></li><li><p>普通自動車免許（AT限定可）</p></li><li><p>明るくコミュニケーション力のある方</p></li></ul><h2>勤務地</h2><p>〇〇県〇〇市〇〇町（最寄駅：〇〇駅）</p><h2>勤務時間</h2><p>9:00 ～ 18:00（休憩1時間）</p><h2>給与・待遇</h2><p>月給 25万円～35万円＋インセンティブ<br>各種社会保険完備、交通費支給、資格手当あり</p><h2>応募方法</h2><p>履歴書（写真貼付）・職務経歴書をメールにてご送付ください。書類選考後、面接日程をご案内いたします。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 208, column_blog_id: 1 }
    - { column_id: abf83e0b-6d28-4287-9ac9-0bca82214dda, column_status: open, column_sort: 2, column_align: '', column_type: osmap, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: 1180x320, column_field_1: '', column_field_2: '35.16923952828369', column_field_3: '136.9375312328339', column_field_4: '17', column_field_5: acms-col-sm-12, column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 210, column_blog_id: 1 }
    - { column_id: bee58554-9a34-4a6e-ab00-36aa4f396afb, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>名古屋市内の不動産価格は近年堅調に推移しており、特に中心部の人気エリアでは価格が上昇傾向にあります。当社では最新の市場動向を踏まえた詳細レポートを公開しており、購入や売却をご検討中の方に役立つ情報をまとめております。</p><p>地域ごとの価格差や今後の見通しも解説しておりますので、不動産取引の判断材料としてぜひご参考ください。ご質問やご相談もお気軽にお寄せください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 216, column_blog_id: 1 }
    - { column_id: ee1400be-7a7a-4ebf-b7e6-ae95313e3e48, column_status: open, column_sort: 2, column_align: '', column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<h2>概要</h2><div class="tableWrapper"><table class=""><tbody><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>社名</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>株式会社ウツワ◯エステート</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>設立</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>2004年9月</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>代表者</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>山田 太郎</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>資本金</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>300万円</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>従業員数</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>15人（パート・アルバイト含）</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>所在地</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>〒000-0000</p><p>愛知県名古屋市中村区名駅0-00-0 〇〇ビル5F</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>連絡先</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>e-mail: info@example.com&nbsp;</p><p>TEL: <a target="_blank" rel="noopener noreferrer nofollow" class="link" href="tel:1234567890">123-456-7890</a></p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>事業内容</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>不動産売買・賃貸仲介</p><p>賃貸管理業務</p><p>住宅・商業施設の企画・開発</p></td></tr><tr><th colspan="1" rowspan="1" style="background-color: rgb(245,245,245)"><p>取引銀行</p></th><td colspan="1" rowspan="1" style="background-color: rgb(255,255,255)"><p>〇〇銀行、〇〇銀行、〇〇銀行、〇〇信用金庫、〇〇信用金庫</p></td></tr></tbody></table></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 15, column_blog_id: 1 }
    - { column_id: f5f651d8-5ca4-490c-9e1b-abdd44ee591c, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="213" data-no-lightbox="false"><figure class="media-width-100 "><a href="/media/001/202507/sample-efead5.png?v=20250710224838" data-rel="SmartPhoto" data-group="213"><img src="/media/001/202507/sample-efead5.png?v=20250710224838" class="unit-id-213" width="1200 " height=" 675" loading="lazy" data-mid="47"></a></figure></div><p>このたび、事務スタッフ（総務・管理）の募集ページを当社ホームページに新たに設けました。<br>総務や経理、管理業務を中心に、会社の円滑な運営を支える重要なポジションです。未経験の方も歓迎しております。</p><p>詳しい仕事内容や応募条件、待遇などを掲載しておりますので、ご興味のある方はぜひご覧いただき、ご応募をお待ちしております。</p><p>ご不明点があればお気軽にお問い合わせください。</p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 213, column_blog_id: 1 }
    - { column_id: f74864a6-2f6d-4ee0-9acd-10ba80586985, column_status: open, column_sort: 2, column_align: center, column_type: quote, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: appleple, column_field_2: '@appleplecom', column_field_3: '名古屋のCMS構築・Web制作会社 アップルップル', column_field_4: Web制作、CMS構築なら名古屋のアップルップルへ。CMSを使ったWebサイトの更新など、お客様のインターネット活用をサポートいたします。お気軽にご相談ください。, column_field_5: '', column_field_6: 'https://www.appleple.com', column_field_7: '', column_field_8: 'https://www.appleple.com/media/001/202405/ogp2024.png', column_group_class: '', column_group_tag: '', column_entry_id: 211, column_blog_id: 1 }
    - { column_id: fad798b9-499a-4a73-b888-81a5175dfefc, column_status: open, column_sort: 1, column_align: center, column_type: block-editor, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: '<p>2025年5月1日より、一部賃貸物件の仲介手数料を改定いたしました。</p><p>これはお客様により良いサービスを継続的にご提供するための見直しであり、ご理解を賜りますようお願い申し上げます。</p><p>詳細な料金や対象物件については、当社スタッフまでお気軽にお問い合わせください。今後もご満足いただけるよう努めてまいります。</p><div class="media-image-block media-align-center js_notStyle" data-type="imageBlock" data-align="center" data-width="100%" data-eid="214" data-no-lightbox="false"><figure class="media-width-100"><a href="/media/001/202507/sample-daefd5.png?v=20250710224839" data-rel="SmartPhoto" data-group="214"><img src="/media/001/202507/sample-daefd5.png?v=20250710224839" class="unit-id-214" width="1200 " height=" 675" loading="lazy" data-mid="51" alt=""></a></figure></div><p></p>', column_field_2: '', column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 214, column_blog_id: 1 }
