    - { column_id: c10810e1-219c-4191-900e-1e365b09bf3a, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "先日、〇〇経済新聞に当社のDX推進に関する取り組みが掲載されました。\n記事では、中小企業のデジタル化を支援する当社のソリューションが詳しく紹介されています。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 14, column_blog_id: 2 }
    - { column_id: 7e6e8ded-3643-45ce-ab22-6eecca0b8e06, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "当社では、お客様および従業員の安全を最優先に考え、新型コロナウイルス感染症対策を徹底しております。\n引き続き、政府や自治体の方針に基づき、適切な対応を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 15, column_blog_id: 2 }
