    - { column_id: 96e0bbeb-5130-4303-bc04-2a56a35ef0c5, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、かねてより準備を進めておりましたコーポレートサイトのリニューアルが完了いたしましたので、お知らせいたします。\n今回のリニューアルでは、デザインの一新に加え、より見やすく、分かりやすい情報提供を目指しました。\n今後も内容の充実に努め、皆様に役立つ情報発信を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 12, column_blog_id: 2 }
    - { column_id: 637932ec-c496-4eef-8a89-d3858cf82b1e, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お客様のビジネス課題を解決するため、新規システムの導入支援サービスを開始いたしました。\n要件定義から導入、運用サポートまで一貫して支援し、お客様の業務効率化と生産性向上に貢献します。\nお気軽にお問い合わせください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 13, column_blog_id: 2 }
