    - { column_id: 1686d1b0-df6c-42f1-8ac7-1ee9dc61c70f, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、かねてより準備を進めておりましたコーポレートサイトのリニューアルが完了いたしましたので、お知らせいたします。\n今回のリニューアルでは、デザインの一新に加え、より見やすく、分かりやすい情報提供を目指しました。\n今後も内容の充実に努め、皆様に役立つ情報発信を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 173, column_blog_id: 6 }
    - { column_id: 81b635bd-9472-4cae-b74d-8bf1b09d9bde, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お客様のビジネス課題を解決するため、新規システムの導入支援サービスを開始いたしました。\n要件定義から導入、運用サポートまで一貫して支援し、お客様の業務効率化と生産性向上に貢献します。\nお気軽にお問い合わせください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 174, column_blog_id: 6 }
    - { column_id: 78734703-c713-444f-87c7-c36355a8739a, column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="/contact">お問い合わせ</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 174, column_blog_id: 6 }
    - { column_id: 8f8a6460-a009-4f66-af78-9e067525f4f8, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "先日、〇〇経済新聞に当社のDX推進に関する取り組みが掲載されました。\n記事では、中小企業のデジタル化を支援する当社のソリューションが詳しく紹介されています。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 175, column_blog_id: 6 }
    - { column_id: 8c2b33bf-3cae-4803-b5e3-7b3fdb502cfb, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "現在、Webディレクターとエンジニアを募集しております。\n詳細は採用情報ページをご覧ください。\n皆様のエントリーをお待ちしております。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 176, column_blog_id: 6 }
    - { column_id: f1a39f26-1a35-42a7-aded-c5332f3574e7, column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="/recruit">採用情報</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 176, column_blog_id: 6 }
    - { column_id: 9c67ed4f-399f-400d-89a9-973c1f623cf5, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "当社では、お客様および従業員の安全を最優先に考え、新型コロナウイルス感染症対策を徹底しております。\n引き続き、政府や自治体の方針に基づき、適切な対応を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 177, column_blog_id: 6 }
    - { column_id: 720af567-7e87-4845-965e-36bdf76d8065, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は新たなSaaSプロダクト「〇〇」をリリースいたしました。\n本プロダクトは、中小企業の業務効率化を強力にサポートするクラウド型サービスです。\n詳細についてはプレスリリースをご覧ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 178, column_blog_id: 6 }
    - { column_id: 03566745-7614-4637-b57d-13183f53878c, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は〇〇県が推進する地方創生プロジェクトに参画いたしました。\nITの力で地域の活性化に貢献してまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 179, column_blog_id: 6 }
    - { column_id: 1d338d5b-5f2c-4aed-9c6b-d9352cf091e2, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "近年、Webサイトへのサイバー攻撃が増加しており、セキュリティ対策は企業にとって喫緊の課題となっています。\n当社では、Webサイトの脆弱性を診断し、適切な対策をご提案するセキュリティ診断サービスを開始いたしました。\n大切なWeb資産を守るために、ぜひご検討ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 180, column_blog_id: 6 }
