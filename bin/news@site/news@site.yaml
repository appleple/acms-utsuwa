    - { column_id: 7164c621-a823-47a0-b72a-cb03e4d676a1, column_status: open, column_sort: 15, column_align: center, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="box-bordered"', column_group: '', column_size: '', column_field_1: "#記述リスト\n記述リストが入ります記述リストが入ります記述リストが入ります記述リストが入ります\n#記述リスト\n記述リストが入ります記述リストが入ります記述リストが入ります記述リストが入ります\n#記述リスト\n記述リストが入ります記述リストが入ります記述リストが入ります記述リストが入ります", column_field_2: dl, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 16, column_blog_id: 2 }
    - { column_id: 156f0f65-e34c-4d58-88e5-75aa01800f39, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、かねてより準備を進めておりましたコーポレートサイトのリニューアルが完了いたしましたので、お知らせいたします。\n今回のリニューアルでは、デザインの一新に加え、より見やすく、分かりやすい情報提供を目指しました。\n今後も内容の充実に努め、皆様に役立つ情報発信を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 17, column_blog_id: 2 }
    - { column_id: 00ef02d4-0433-4a89-a952-1f4c77071ce1, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お客様のビジネス課題を解決するため、新規システムの導入支援サービスを開始いたしました。\n要件定義から導入、運用サポートまで一貫して支援し、お客様の業務効率化と生産性向上に貢献します。\nお気軽にお問い合わせください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 18, column_blog_id: 2 }
    - { column_id: d9d988b7-4fcf-46b4-b752-cbbecb40d10d, column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="/contact">お問い合わせ</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 18, column_blog_id: 2 }
    - { column_id: 800c787a-9180-4305-8596-9e2fb0286133, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "先日、〇〇経済新聞に当社のDX推進に関する取り組みが掲載されました。\n記事では、中小企業のデジタル化を支援する当社のソリューションが詳しく紹介されています。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 19, column_blog_id: 2 }
    - { column_id: 4941f493-bcba-410a-a519-f1615e9acdf3, column_status: open, column_sort: 1, column_align: center, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "現在、Webディレクターとエンジニアを募集しております。\n詳細は採用情報ページをご覧ください。\n皆様のエントリーをお待ちしております。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 20, column_blog_id: 2 }
    - { column_id: e0cf6fb2-7e82-4503-bdde-a7b5dd5972c0, column_status: open, column_sort: 2, column_align: center, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="/recruit">採用情報</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 20, column_blog_id: 2 }
    - { column_id: 9e904103-ec55-4e8f-844b-18280b6b5f4b, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "当社では、お客様および従業員の安全を最優先に考え、新型コロナウイルス感染症対策を徹底しております。\n引き続き、政府や自治体の方針に基づき、適切な対応を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 21, column_blog_id: 2 }
    - { column_id: ad80f909-e683-4a3c-91a0-4e458384babc, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は新たなSaaSプロダクト「〇〇」をリリースいたしました。\n本プロダクトは、中小企業の業務効率化を強力にサポートするクラウド型サービスです。\n詳細についてはプレスリリースをご覧ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 22, column_blog_id: 2 }
    - { column_id: 333baa06-ed9c-46d8-aa60-1e689a1eb1e1, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は〇〇県が推進する地方創生プロジェクトに参画いたしました。\nITの力で地域の活性化に貢献してまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 23, column_blog_id: 2 }
    - { column_id: ce91ace3-bc7c-4f9d-9b48-464121173660, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "近年、Webサイトへのサイバー攻撃が増加しており、セキュリティ対策は企業にとって喫緊の課題となっています。\n当社では、Webサイトの脆弱性を診断し、適切な対策をご提案するセキュリティ診断サービスを開始いたしました。\n大切なWeb資産を守るために、ぜひご検討ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 24, column_blog_id: 2 }
