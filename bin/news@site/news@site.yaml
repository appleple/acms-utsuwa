    - { column_id: 824e79bb-3863-4e4e-ad93-d4f710f1ba32, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、かねてより準備を進めておりましたコーポレートサイトのリニューアルが完了いたしましたので、お知らせいたします。\n今回のリニューアルでは、デザインの一新に加え、より見やすく、分かりやすい情報提供を目指しました。\n今後も内容の充実に努め、皆様に役立つ情報発信を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 12, column_blog_id: 2 }
    - { column_id: 017ce122-b0a4-4634-8820-4a17c8e650f5, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "お客様のビジネス課題を解決するため、新規システムの導入支援サービスを開始いたしました。\n要件定義から導入、運用サポートまで一貫して支援し、お客様の業務効率化と生産性向上に貢献します。\nお気軽にお問い合わせください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 13, column_blog_id: 2 }
    - { column_id: a635ad40-44f7-4362-b5d2-f95239117ac6, column_status: open, column_sort: 2, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: ' class="text-btn"', column_group: '', column_size: '', column_field_1: '<a href="/contact">お問い合わせ</a>', column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 13, column_blog_id: 2 }
    - { column_id: 1f405211-24b2-472c-a098-37342314d575, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "先日、〇〇経済新聞に当社のDX推進に関する取り組みが掲載されました。\n記事では、中小企業のデジタル化を支援する当社のソリューションが詳しく紹介されています。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 14, column_blog_id: 2 }
    - { column_id: bdbf008c-56a2-41dc-ba77-35e7c8dec363, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "当社では、お客様および従業員の安全を最優先に考え、新型コロナウイルス感染症対策を徹底しております。\n引き続き、政府や自治体の方針に基づき、適切な対応を行ってまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 15, column_blog_id: 2 }
    - { column_id: ea7fce74-4d77-41bd-a5ac-c1ca88967f7b, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は新たなSaaSプロダクト「〇〇」をリリースいたしました。\n本プロダクトは、中小企業の業務効率化を強力にサポートするクラウド型サービスです。\n詳細についてはプレスリリースをご覧ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 16, column_blog_id: 2 }
    - { column_id: e615cc5d-dc99-4bd5-b3d8-e86d793823f6, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "この度、当社は〇〇県が推進する地方創生プロジェクトに参画いたしました。\nITの力で地域の活性化に貢献してまいります。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 17, column_blog_id: 2 }
    - { column_id: da066318-70dc-4806-94d1-1290f4ad95ef, column_status: open, column_sort: 1, column_align: auto, column_type: text, column_parent_id: null, column_anker: '', column_attr: '', column_group: '', column_size: '', column_field_1: "近年、Webサイトへのサイバー攻撃が増加しており、セキュリティ対策は企業にとって喫緊の課題となっています。\n当社では、Webサイトの脆弱性を診断し、適切な対策をご提案するセキュリティ診断サービスを開始いたしました。\n大切なWeb資産を守るために、ぜひご検討ください。", column_field_2: p, column_field_3: '', column_field_4: '', column_field_5: '', column_field_6: '', column_field_7: '', column_field_8: '', column_group_class: '', column_group_tag: '', column_entry_id: 18, column_blog_id: 2 }
